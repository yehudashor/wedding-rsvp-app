    /* -- WRSVP-UXFIX-5: mobile responsive cards for .data-table --

    @media (max-width: 768px) {
      body:not(.force-table) .data-table,
      body:not(.force-table) .data-table thead,
      body:not(.force-table) .data-table tbody,

        display: block;
        width: 100%;

         cards carry their own labels instead. */
      body:not(.force-table) .data-table thead,
      body:not(.force-table) .data-table tr:first-child { display: none; }

      body:not(.force-table) .data-table {
        background: transparent;

        align-items: baseline;
        gap: 10px;

<!-- ═══ [FIXLIST5 2026-07-10] appModal - in-app styled replacement for the native gray browser
     dialogs. ONE shared component spec, implemented per-document (the organiser screens are
     separate documents). Promise-based with EXACT native semantics:
       appModal.alert(msg, title?)        -> Promise<void>          (אישור / Enter / Escape dismiss)
       appModal.confirm(msg, title?)      -> Promise<boolean>       (אישור/Enter = true · ביטול/Escape = false)
       appModal.prompt(msg, def?, title?) -> Promise<string|null>   (אישור/Enter = value · ביטול/Escape = null)
     RTL; app palette: #fffdf8 surface / #3c6e71 primary button / #efe7d8 accent button / dark text;
     12px radius; rgba(0,0,0,.45) overlay. NO outside-click dismissal (native dialogs are modal).
     Sequential calls are queued, so overlapping dialogs can never collide. ═══ -->
<script>
(function () {
  'use strict';
  var css = ''
    + '#app-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;'
    +   'align-items:center;justify-content:center;padding:16px;direction:rtl;}'
    + '#app-modal-ov.open{display:flex;}'
    + '#app-modal-box{background:#fffdf8;color:#2c3e50;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.3);'
    +   'width:100%;max-width:420px;padding:20px 18px;font-family:inherit;text-align:right;}'
    + '#app-modal-title{margin:0 0 10px;font-size:1.15rem;font-weight:800;color:#5f4a1e;border:none;}'
    + '#app-modal-msg{margin:0 0 14px;font-size:1rem;line-height:1.5;white-space:pre-wrap;word-break:break-word;}'
    + '#app-modal-input{display:none;width:100%;border:1.5px solid #cbbf9f;border-radius:10px;padding:10px 12px;'
    +   'font-size:1rem;font-family:inherit;margin:0 0 14px;background:#fff;box-sizing:border-box;}'
    + '#app-modal-input:focus{border-color:#3c6e71;outline:none;}'
    + '#app-modal-btns{display:flex;gap:10px;}'
    + '#app-modal-ok{flex:1;background:#3c6e71;color:#fff;border:none;border-radius:10px;padding:11px 18px;'
    +   'font-size:1rem;font-weight:bold;cursor:pointer;font-family:inherit;min-height:46px;}'
    + '#app-modal-cancel{flex:0 0 auto;background:#efe7d8;color:#5f4a1e;border:none;border-radius:10px;'
    +   'padding:11px 18px;font-size:1rem;font-weight:bold;cursor:pointer;font-family:inherit;min-height:46px;display:none;}'
    + '#app-modal-ok:hover,#app-modal-cancel:hover{opacity:.9;}';
  var st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  var ov = null, boxTitle, boxMsg, boxInput, btnOk, btnCancel;
  var queue = Promise.resolve();   // serialises overlapping dialog requests (one dialog at a time)
  var settle = null;               // resolver of the ACTIVE dialog ('null' = none open)
  var activeKind = '';
  var prevFocus = null;

  function build() {
    if (ov) { return; }
    ov = document.createElement('div');
    ov.id = 'app-modal-ov';
    ov.innerHTML = '<div id="app-modal-box" role="dialog" aria-modal="true" aria-labelledby="app-modal-title">'
      + '<h2 id="app-modal-title"></h2>'
      + '<div id="app-modal-msg"></div>'
      + '<input id="app-modal-input" type="text" autocomplete="off">'
      + '<div id="app-modal-btns">'
      +   '<button type="button" id="app-modal-ok">אישור</button>'
      +   '<button type="button" id="app-modal-cancel">ביטול</button>'
      + '</div></div>';
    document.body.appendChild(ov);
    boxTitle = document.getElementById('app-modal-title');
    boxMsg = document.getElementById('app-modal-msg');
    boxInput = document.getElementById('app-modal-input');
    btnOk = document.getElementById('app-modal-ok');
    btnCancel = document.getElementById('app-modal-cancel');
    btnOk.addEventListener('click', function () { done(true); });
    btnCancel.addEventListener('click', function () { done(false); });
    // Escape⇒cancel/null, Enter⇒confirm - CAPTURE phase so no page-level key handler (e.g. the
    // phone-gate Enter submit) can ever fire underneath an open dialog.
    document.addEventListener('keydown', function (e) {
      if (!settle || !ov.classList.contains('open')) { return; }
      if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); done(false); }
      else if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); done(true); }
    }, true);
  }

  // Resolve the active dialog with the EXACT native return value per kind.
  function done(ok) {
    if (!settle) { return; }
    var s = settle; settle = null;
    var val;
    if (activeKind === 'alert') { val = undefined; }                      // native alert(): undefined
    else if (activeKind === 'confirm') { val = !!ok; }                    // native confirm(): true/false
    else { val = ok ? String(boxInput.value) : null; }                    // native prompt(): string/null
    ov.classList.remove('open');
    try { if (prevFocus && prevFocus.focus) { prevFocus.focus(); } } catch (e) {}
    prevFocus = null;
    s(val);
  }

  function show(kind, msg, def, title, labels) {
    build();
    activeKind = kind;
    boxTitle.textContent = (title == null ? '' : String(title));
    boxTitle.style.display = boxTitle.textContent ? 'block' : 'none';
    boxMsg.textContent = (msg == null ? '' : String(msg));
    boxInput.style.display = (kind === 'prompt') ? 'block' : 'none';
    boxInput.value = (kind === 'prompt' && def != null) ? String(def) : '';
    btnCancel.style.display = (kind === 'alert') ? 'none' : 'inline-block';
    // [MINE-MUT 2026-07-12] optional per-call button-label override. ONLY the two button texts
    // change; default stays אישור/ביטול so every existing caller (which passes no labels) is
    // byte-for-byte unchanged. labels = { yes?:'…', no?:'…' }.
    var L = labels || {};
    btnOk.textContent     = (L.yes != null) ? String(L.yes) : 'אישור';
    btnCancel.textContent = (L.no  != null) ? String(L.no)  : 'ביטול';
    prevFocus = document.activeElement;
    ov.classList.add('open');
    return new Promise(function (resolve) {
      settle = resolve;
      try {
        if (kind === 'prompt') { boxInput.focus(); boxInput.select(); }   // native prompt pre-selects the default
        else { btnOk.focus(); }
      } catch (e) {}
    });
  }

  // Public API - each call queues behind any dialog already open.
  function enqueue(kind, msg, def, title, labels) {
    var p = queue.then(function () { return show(kind, msg, def, title, labels); });
    queue = p.then(function () {}, function () {});
    return p;
  }
  window.appModal = {
    alert:   function (msg, title)              { return enqueue('alert',   msg, undefined, title); },
    // [MINE-MUT 2026-07-12] confirm gains an optional 3rd arg `labels` ({yes,no}) that overrides ONLY
    // the button texts (default אישור/ביטול). Backward-compatible: confirm(msg) / confirm(msg,title)
    // behave exactly as before.
    confirm: function (msg, title, labels)      { return enqueue('confirm', msg, undefined, title, labels); },
    prompt:  function (msg, def, title)         { return enqueue('prompt',  msg, def,       title); }
  };
}());
</script>

<script>
/* [IRONFIX 2026-07-09] runScript bridge - replaces the GAS client RPC (google-script-run) for the

   /exec, so no preflight may ever be triggered), redirect:'follow' (GAS answers via googleusercontent
   redirect). Host-based env routing identical to [STAGING-ROUTING] in index.html: unknown hosts
   fail-safe to STAGING. Each BUILD entry maps the original positional signature to the matching
   doPost action payload. then(success, failure) mirrors withSuccessHandler/withFailureHandler
   exactly: failure fires only on network/server-level errors, never on success-handler exceptions. */
(function () {
  'use strict';
  var PROD_HOSTS = ['magiim.pages.dev', 'yehudashor.github.io'];
  var EXEC_PROD = 'https://script.google.com/macros/s/AKfycbyMjAOKf5l_5hzeLy4DAEBanw9ZO3n3_S7TVXACYRrCQh_QeTNuuqqSUSm6bl59mRVM_A/exec';

    getDashboardData:      function (a) { return { action: 'dashboardData',      token: a[0], mode: a[1], phone: a[2] || '', owner_sid: a[3] || '' }; },
    getCategoriesData:     function (a) { return { action: 'categoriesData',     token: a[0], owner_sid: a[1] || '', phone: a[2] || '' }; },
    getSideCategoriesData: function (a) { return { action: 'sideCategoriesData', token: a[0], phone: a[1] || '' }; },
    getUnconfirmedInvites: function (a) { return { action: 'unconfirmedInvites', token: a[0], mode: a[1], phone: a[2] || '' }; },
    categoryOp:            function (a) { var b = a[0] || {}, o = { action: 'categoryOp' }; for (var k in b) { if (Object.prototype.hasOwnProperty.call(b, k)) o[k] = b[k]; } return o; },
    addManualGuest:        function (a) { var b = a[0] || {}, o = { action: 'addManual' };  for (var k in b) { if (Object.prototype.hasOwnProperty.call(b, k)) o[k] = b[k]; } return o; },
    // [MINE-MUT 2026-07-12] organiser self-service MANUAL guest mutators. Single-object arg (like
    // addManualGuest/categoryOp): spread every payload field onto the doPost action. Client shapes:
    //   deleteManualGuest({ dashboard_token, response_id })
    //   updateManualGuest({ dashboard_token, response_id, guest_name, phone, men_count, women_count })
    deleteManualGuest:     function (a) { var b = a[0] || {}, o = { action: 'deleteManualGuest' }; for (var k in b) { if (Object.prototype.hasOwnProperty.call(b, k)) o[k] = b[k]; } return o; },
    updateManualGuest:     function (a) { var b = a[0] || {}, o = { action: 'updateManualGuest' }; for (var k in b) { if (Object.prototype.hasOwnProperty.call(b, k)) o[k] = b[k]; } return o; },
    registerOrganiser:     function (a) { return { action: 'registerOrg', name: a[0], side: a[1], phone: a[2] || '' }; }
  };
  window.runScript = function (fn) {
    var args = Array.prototype.slice.call(arguments, 1);
    var build = BUILD[fn];
    if (!build) { return Promise.reject(new Error('runScript: unknown fn ' + fn)); }
    return fetch(EXEC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(build(args)),
      redirect: 'follow'
    }).then(function (r) {
      /* [verifier-2 F3] a GAS server-crash returns an HTML error page; surface it to failure handlers
         as the same friendly communication-error text the register screen always used as its fallback,

<script>
(function () {
  'use strict';

  // ── [IRONFIX 2026-07-09] Gate vars from the URL (self-hosted page; no GAS template injection) ──
  // Same params dashUrl()/index.html always passed: ?mode=&token=&phone=[&owner_sid=]. Mapping matches
  // doGet exactly: URL mode 'dashboard' -> template mode 'personal' (_renderDashboardShell('personal')),

  // (NEEDS_PHONE gate unchanged); combined does one initial getDashboardData fetch at boot (below),

  // checkboxes + action-bar, grouped-by-category view) is available to:
  //   - the SUPER on the combined board (self, or an acted-as primary via owner_sid), AND
  //   - ANY PRIMARY (is_primary/admin) on their OWN personal/side board, scoped to THEIR OWN guests.

  // a function (not the init-time IS_SUPER constant) because D.is_primary only arrives with the data.
  function catUiEnabled() {
    // [CATEGORIES-FEATBATCH2 N2] broadened: EVERY authenticated organiser on their OWN personal/side
    // board (not only a primary) may categorise their OWN guests. The combined-super path is unchanged
    // (IS_SUPER short-circuits first; the new clause is never reached there, and MODE==='combined' would
    // make it false anyway). Write-isolation is intact server-side: a non-super caller sends no owner_sid

    return !!(D && D.sid && MODE !== 'combined');   // any authenticated organiser on their OWN board
  }
  // The viewer's OWN sid (personal/side payload). Empty on the super combined board (no single owner).
  function selfSid() { return String((D && D.sid) || ''); }
  // Latest categories payload from mode=categories: { categories:[{cat_id,name,created_at,count}], assignments:[{dedupe_key,cat_id}] }.
  var CAT_DATA = { categories: [], assignments: [] };
  // [FIXLIST-R3 #2 2026-07-10] one-shot guard: seed CAT_DATA from the categories the server now bundles
  // into the dashboard payload, so the MINE chips paint in the FIRST render (no getCategoriesData lag).
  var _catSeededFromPayload = false;
  // dedupe_key -> cat_id join map, rebuilt from CAT_DATA.assignments on every fetch.
  var CAT_ASSIGN = {};
  // Whether the "כולם" grouped view is the active records view (vs. the default side lists).
  var CAT_VIEW = false;
  // Selected dedupe_keys for bulk classify (R4B).
  var CAT_SEL = {};

  // ===== CATEGORIES-FEATBATCH2 state (N1/N3) =====
  // [N1] whether the purple "מארגנים בצד שלי" per-organiser tabs view is the active records view on a
  // PRIMARY's side board. Mutually exclusive with CAT_VIEW and with the default breakdown (FIX-A).
  var SIDE_ORG_VIEW = false;
  // [N3] side-scoped read-only categories cache, keyed by sender_id → { name, categories, assignments }.
  // Fetched ONCE (lazily on first purple-button open) via mode=side_categories, reused per tab open.
  var SIDE_CAT = { byOwner: {} };
  var SIDE_CAT_LOADED = false;
  // [N1-PERSONAL] side-board breakdown fetched lazily when a primary is on their PERSONAL board
  // (personal payload has no D.breakdown). Fetched once via getDashboardData(TOKEN,'side',AUTH_PHONE).
  var SIDE_BREAKDOWN = null;

  // ===== ROUNDFIX-20260708 view-state (records-area is exactly one of: default | MINE | CAT | SIDE_ORG | UNCONF) =====
  // [#1ב] "האורחים שלי": show ONLY the viewer's own guests (own-sid scope), nothing else.
  var MINE_VIEW = false;
  // [#6א] "מי לא אישר עדיין": show ONLY the unconfirmed list IN-CONTENT (below the buttons), replacing
  //       the records area (was a separate static panel appended BELOW the still-visible guest list).
  var UNCONF_VIEW = false;
  // [#3] one-shot guard so a PRIMARY's board opens on the category view by default, without
  //      overriding the user's later navigation.
  var _defaultApplied = false;
  // [#4] set by a view-switching button so renderData scrolls the records area up to the buttons.
  var _scrollPending = false;

  // ===== [MINESCROLL 2026-07-12] MINE auto-scroll + two-level "back-up" arrow =====
  // The dashboard runs INSIDE #portalDashIframe; the fixed host #appHeader (64px) sits ABOVE the
  // iframe and never overlaps the iframe's content, so "just below the header" inside the iframe is
  // simply the TOP of the iframe's own scroll viewport (scrollIntoView block:'start'). A tiny
  // scroll-margin-top (see CSS .mine-anchor) adds breathing room.
  //  LEVEL 1 = "האורחים שלי" heading at the top (set when the user ENTERS the MINE view).
  //  LEVEL 2 = the first guest card (or the filter block if zero guests) at the top (set by any filter).
  // The arrow shows ONLY after one of these PROGRAMMATIC scrolls, never on a manual user scroll — a
  // "programmatic" flag + short settle window let a scroll listener tell the two apart and hide the
  // arrow on any non-programmatic scroll. Clicking the arrow steps back exactly one level:
  //   LEVEL 2 → LEVEL 1 (arrow stays, now in level-1 state) → page-top (arrow hides).
  var _mineAutoScroll   = false;   // true during/just-after a programmatic scroll (settle guard)
  var _mineAutoTimer    = null;    // settle timer id
  var _mineBackLevel    = 0;       // 0 none | 1 last auto-scroll was LEVEL 1 | 2 was LEVEL 2
  var _mineEntryPending = false;   // ta-mine-btn queued a LEVEL-1 scroll for the next MINE render
  var _mineFilterPending= false;   // a MINE filter queued a LEVEL-2 scroll for the next MINE render
  var _mineScrollListenerBound = false;
  // arm the "this scroll is programmatic" guard; auto-clears after a short settle window so the
  // trailing smooth-scroll frames don't count as a manual scroll (which would hide the arrow).
  function _mineArmProg() {
    _mineAutoScroll = true;
    if (_mineAutoTimer) { clearTimeout(_mineAutoTimer); }
    _mineAutoTimer = setTimeout(function () { _mineAutoScroll = false; _mineAutoTimer = null; }, 900);
  }
  function _mineArrowEl() { return document.getElementById('mine-backup-arrow'); }
  // show the arrow and stamp it with the level it will step back FROM (1 or 2). Toggle .show on BOTH
  // the button and its row (row height is class-driven, not :has()-driven → no CSS-support dependency).
  function _mineShowArrow(level) {
    var a = _mineArrowEl();
    if (!a) { return; }
    a.setAttribute('data-level', String(level));
    a.classList.add('show');
    var r = a.parentNode; if (r && r.classList) { r.classList.add('show'); }
  }
  function _mineHideArrow() {
    var a = _mineArrowEl();
    if (a) { a.classList.remove('show'); var r = a.parentNode; if (r && r.classList) { r.classList.remove('show'); } }
    _mineBackLevel = 0;
  }
  // bind ONCE: any scroll of the iframe window that is NOT flagged programmatic hides the arrow.
  function _mineBindScrollListener() {
    if (_mineScrollListenerBound) { return; }
    _mineScrollListenerBound = true;
    window.addEventListener('scroll', function () {
      if (_mineAutoScroll) { return; }   // our own smooth-scroll — ignore
      var a = _mineArrowEl();
      if (a && a.classList.contains('show')) { _mineHideArrow(); }
    }, { passive: true });
  }
  // smooth-scroll so `el` sits at the top of the iframe viewport, mark the given level, show the arrow.
  function _mineScrollToLevel(el, level) {
    if (!el || !el.scrollIntoView) { return; }
    _mineBackLevel = level;
    _mineArmProg();
    _mineShowArrow(level);
    try { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (e) {}
  }

  // ===== ROUNDFIX2 (שלב-ב׳) — unconfirmed-as-cards state =====
  // [#3] active filter for the unconfirmed cards: 'all' | 'notopened' (טופס טרם נפתח) | 'opened' (נפתח אך טרם אושר).
  var UNCONF_FILTER = 'all';
  // cached people[] from the last getUnconfirmedInvites (so filter/assign re-render without a refetch).
  var UNCONF_PEOPLE = null;

  // ── HTML-escape a value for safe insertion into innerHTML
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      // [CATEGORIES-FEATBATCH A1 SECURITY] escape the single-quote too: user-controlled
      // category names (and guest fields) land inside single-quote-delimited attributes
      // (data-cat, data-name, <option value='...'>, data-dk). Without this a name like
      // x' onerror='… would break out of the attribute and inject a handler (stored XSS),
      // exploitable cross-actor once primaries manage their own categories (A4). Do NOT
      // rely on server sanitiseText for quote safety - escape at the sink.
      .replace(/'/g, '&#39;');
  }

  // ── Wrap numbers / Latin text in <bdi> for correct RTL rendering
  function bdi(v) {
    return '<bdi>' + esc(v) + '</bdi>';

  // ── Attending check mark / cross
  function attCell(v) {
    var yes = (v === true || String(v).toLowerCase() === 'true');

    var c = String(ch || '').toLowerCase();
    if (c === 'wa') { return 'וואטסאפ'; }
    if (c === 'email') { return 'מייל'; }
    if (c === 'manual') { return 'ידנית'; }
    return c ? c : '-';

  // ── req #1: format a date/time to DD/MM/YYYY HH:mm in Asia/Jerusalem (Israel time)
  function fmtDateTimeIL(v) {
    if (!v) { return ''; }
    var d = new Date(v);
    if (isNaN(d.getTime())) { return String(v); }
    try {
      var parts = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Jerusalem', day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).formatToParts(d);
      var m = {};
      for (var i = 0; i < parts.length; i++) { m[parts[i].type] = parts[i].value; }
      return m.day + '/' + m.month + '/' + m.year + ' ' + m.hour + ':' + m.minute;
    } catch (e) {
      return String(v);
    }
  }
  // ── One <tr> for a guest row (includes special_requests column)
  function guestRow(g) {
    var sp = String(g.special_requests || '').replace(/^RECOVERED:?\s*/, '');
    var bl = String(g.blessing || '');
    function longTd(cls, label, txt, emptyTxt) {
      var body = txt ? esc(txt) : '<span class=\'muted\'>' + emptyTxt + '</span>';
      var more = (txt && txt.length > 80) ? '<button type=\'button\' class=\'rm-btn\'>קרא עוד…</button>' : '';
      return '<td class=\'' + cls + ' longtext\' data-label=\'' + label + '\'><span class=\'v\'>' + body + '</span>' + more + '</td>';
    }
    var invBy = String(g.invited_by_name || '');   // req #3: organiser who owns this guest (may be blank)
    var baseRow = '<tr>'
      + '<td data-label=\'שם האורח\'><span class=\'v\'>' + esc(g.guest_name) + '</span></td>'
      + '<td data-label=\'נשלח ע"י\'><span class=\'v\'>' + esc(invBy) + '</span></td>'
      + '<td data-label=\'מגיע?\'><span class=\'v\'>' + attCell(g.attending) + '</span></td>'
      + '<td data-label=\'גברים\'><span class=\'v\'>' + bdi(g.men_count) + '</span></td>'
      + '<td data-label=\'נשים\'><span class=\'v\'>' + bdi(g.women_count) + '</span></td>'
      + '<td data-label=\'טלפון\'><span class=\'v\'>' + bdi(g.phone) + '</span></td>'
      + '<td data-label=\'הזנה\'><span class=\'v\'>' + (String(g.channel) === 'manual' ? 'ידנית' : 'אוטומטית') + '</span></td>'
      + '<td data-label=\'נשלח דרך\'><span class=\'v\'>' + channelLabel(g.channel) + '</span></td>'

      + '</tr>';
    if (g.nameClashWarning) {
      baseRow += '<tr class=\'name-clash-row\'><td colspan=\'11\' style=\'background:#fff3cd;color:#7d5a14;font-weight:bold;text-align:right;padding:8px 12px;border-top:0;\'>'
        + '⚠️ כבר קיים אצלך אורח עם שם כזה במדויק, ועם מספר מוזמנים שונה - אנא בדוק את העניין'
        + '</td></tr>';
    }
    return baseRow;
  }

  // [CATEGORIES-FEATBATCH R5, §0.2] client mirror of _sortGuestsNewestFirst: active-row
  // TIMESTAMP descending, tie-break response_id desc. Sorts a COPY (guestTable's rows may be
  // a shared breakdown array). _sortTs is provided by the server; fall back to parsing timestamp.
  function _sortGuestsNewestFirstClient(rows) {
    return (rows || []).slice().sort(function (a, b) {
      var ta = Number(a && a._sortTs); if (!ta || isNaN(ta)) { ta = new Date((a && a.timestamp) || 0).getTime() || 0; }
      var tb = Number(b && b._sortTs); if (!tb || isNaN(tb)) { tb = new Date((b && b.timestamp) || 0).getTime() || 0; }
      var d = tb - ta;
      if (d) { return d; }
      var ra = String((a && a.response_id) || '');
      var rb = String((b && b.response_id) || '');
      return ra < rb ? 1 : (ra > rb ? -1 : 0);   // response_id desc (tie-break)
    });
  }

  // ── Full guest table; handles empty array gracefully
  function guestTable(rows) {
    if (!rows || rows.length === 0) {
      return '<p style=\'color:#777\'>אין רשומות.</p>';
    }
    // [R5 §0.2] belt-and-suspenders: sort a COPY newest-first at every render site.
    rows = _sortGuestsNewestFirstClient(rows);
    var h = '<table class=\'data-table\'>'
      + '<tr>'
      + "<th>שם</th>"           // שם
      + "<th>נשלח ע\"י</th>"  // נשלח ע"י (invited_by_name, req #3)
      + "<th>מגיע?</th>"  // מגיע?
      + "<th>גברים</th>"  // גברים
      + "<th>נשים</th>"         // נשים
      + "<th>טלפון</th>"   // טלפון

  // ── Summary sentence: "אישרו X איש: Y גברים, Z נשים; W לא יגיעו"

  // ── PHASE 4: top action row (rendered between the green summary box and the tables)
  function topActionsHtml() {
    var h = '<div class=\'top-actions\'>';

    if (MODE !== 'combined' && D && D.is_primary) { h += '<button type=\'button\' class=\'ta-btn ta-side-orgs\' id=\'ta-side-orgs-btn\'>&#128101; אורחים לפי מארגן</button>'; }

    if (MODE !== 'combined' && String((D && D.sid) || '') === 'baa34f647c10') {

  // [CATEGORIES-FEATBATCH R4C] two super-only side buttons: pick a primary of that side and

  // [UIPOLISH3 2026-07-04 - part ד] guest-list filter (personal view). Segmented control; the
  //   data-flt keys are the single extension point - add a key here + a branch in filterRows().
  // [MINEFILTER 2026-07-12] `hideAll` (MINE view only) drops the "הכל" attending chip, because the
  // MINE view now has a SINGLE master "הכל" button above all three groups. The other consumers (the
  // plain confirmed-guest list) call filterBarHtml() with no arg → keep their own "הכל" chip.
  function filterBarHtml(hideAll) {
    function b(v, lbl) {
      return '<button type=\'button\' class=\'flt-btn' + (FILTER === v ? ' active' : '')
        + '\' data-flt=\'' + v + '\'>' + lbl + '</button>';
    }
    return '<div class=\'flt-bar\' role=\'tablist\'>'
      + (hideAll ? '' : b('all', 'הכל'))
      + b('coming', 'מגיעים')
      + b('notcoming', 'לא מגיעים')
      + '</div>';
  }
  // Apply the active filter to a rows array (attending flag only, for now - extensible).
  function filterRows(rows) {
    rows = rows || [];
    if (FILTER === 'coming') {
      return rows.filter(function (g) { return g.attending === true || String(g.attending).toLowerCase() === 'true'; });
    }
    if (FILTER === 'notcoming') {
      return rows.filter(function (g) { return !(g.attending === true || String(g.attending).toLowerCase() === 'true'); });
    }
    return rows;
  }

  // ── S1c D2: build a per-organiser TAB bar + panels for ONE side of the combined
  //    view. `breakdown` is an array of { sender_id, name, guests, summary }. One tab
  //    per organiser; clicking a tab shows ONLY that organiser guest table + summary
  //    (pure DOM toggle, wired after innerHTML). A single organiser still renders one
  //    tab. If `breakdown` is absent/empty, returns '' so the caller falls back to the
  //    existing flat guestTable(rows). `key` is a stable per-side id (e.g. 'groom').
  function combinedOrgTabs(key, breakdown) {
    if (!breakdown || breakdown.length === 0) { return ''; }
    var tabs = '<div class=\'org-tabs\' role=\'tablist\'>';
    var panels = '';
    for (var i = 0; i < breakdown.length; i++) {
      var org = breakdown[i];
      // [CATEGORIES-FEATBATCH R4D] default-collapsed: NONE pre-selected on load (was i===0).
      // The delegated org-tab handler (below) reveals only the clicked panel.
      var active = false;
      var tabId = 'orgtab-' + key + '-' + i;
      var panId = 'orgpanel-' + key + '-' + i;
      var lbl = esc(org.name || org.sender_id || ('מארגן ' + (i + 1))); // מארגן N
      tabs += '<button type=\'button\' class=\'org-tab\' role=\'tab\''
        + ' id=\'' + tabId + '\''
        + ' data-org-side=\'' + key + '\''
        + ' aria-controls=\'' + panId + '\''
        + ' aria-selected=\'' + (active ? 'true' : 'false') + '\'>'
        + lbl + '</button>';
      panels += '<div class=\'org-panel\' role=\'tabpanel\''
        + ' id=\'' + panId + '\''
        + ' aria-labelledby=\'' + tabId + '\''
        + (active ? '' : ' hidden') + '>'
        + '<p>' + summaryText(org.summary) + '</p>'
        + guestTable(org.guests || [])
        + '</div>';
    }
    tabs += '</div>';
    return tabs + panels;
  }

  // ===== CATEGORIES-FEATBATCH render helpers (R4A/R4B) =====

  // A guest row block for one category bucket. Wraps a compact card-friendly table so a checkbox aligns
  // per guest. [CATEGORIES-FEATBATCH2 N3/FIX-B] parameterised by `readOnly`:
  //   readOnly===false → the writable own-view: leading ✓ column + per-row .gc-check checkbox.
  //   readOnly===true  → the N3 side-org drill-in: ZERO write-control nodes (no ✓ header, no .gc-check),
  //     so wireCategoryControls (scoped away from the cat-ro wrapper) never wires a write control here.
  function _catGuestRowsHtml(guests, readOnly) {
    if (!guests || !guests.length) { return '<p style=\'color:#777\'>אין רשומות בקטגוריה זו.</p>'; }
    var sorted = _sortGuestsNewestFirstClient(guests);
    var h = '<table class=\'data-table\'>'
      + '<tr>'
      + (readOnly ? '' : '<th>&#10003;</th>')
      + "<th>שם</th>"
      + "<th>נשלח ע\"י</th>"
      + "<th>מגיע?</th>"
      + "<th>גברים</th>"
      + "<th>נשים</th>"
      + "<th>טלפון</th>"
      + "<th>מתי אישר</th>"
      + '</tr>';
    for (var i = 0; i < sorted.length; i++) {
      var g = sorted[i];
      var dk = String(g.dedupe_key || '');

      h += '<tr>'
        + (readOnly ? '' : '<td data-label=\'בחר\'><input type=\'checkbox\' class=\'gc-check\' data-dk=\'' + esc(dk) + '\'' + checked + '></td>')
        + '<td data-label=\'שם האורח\'><span class=\'v\'>' + esc(g.guest_name) + '</span></td>'
        + '<td data-label=\'נשלח ע"י\'><span class=\'v\'>' + esc(g.invited_by_name || '') + '</span></td>'
        + '<td data-label=\'מגיע?\'><span class=\'v\'>' + attCell(g.attending) + '</span></td>'
        + '<td data-label=\'גברים\'><span class=\'v\'>' + bdi(g.men_count) + '</span></td>'
        + '<td data-label=\'נשים\'><span class=\'v\'>' + bdi(g.women_count) + '</span></td>'
        + '<td data-label=\'טלפון\'><span class=\'v\'>' + bdi(g.phone) + '</span></td>'
        + '<td data-label=\'מתי אישר\'><span class=\'v\'>' + bdi(fmtDateTimeIL(g.timestamp)) + '</span></td>'
        + '</tr>';
    }
    h += '</table>';
    return h;

  // [CATEGORIES-FEATBATCH2 N3/N4] SHARED parameterised grouping core. Buckets `guests` by
  // assignMap[dedupe_key] into `categories` (+ an "ללא סיווג" bucket), emitting one .cat-group per
  // category. Each category header is an N4 disclosure toggle (.cat-toggle) whose guest table lives in
  // a .cat-group-body[hidden] (CLOSED by default; the delegated #dashboard-content handler toggles it).
  //   `key`      disambiguates the disclosure body ids so own-view ('own') vs side-org ('sideorg-'+i)
  //              panels never collide.
  //   `readOnly` true → NO write-control nodes anywhere (passed through to _catGuestRowsHtml). The
  //              manager/action-bar are emitted by the CALLER (own-view only), never here.
  function categoryGroupedFrom(guests, categories, assignMap, readOnly, key) {
    guests = guests || [];
    categories = categories || [];
    assignMap = assignMap || {};
    var byCat = {};
    var uncat = [];
    for (var i = 0; i < guests.length; i++) {
      var dk = String(guests[i].dedupe_key || '');
      var cid = assignMap[dk] || '';
      if (cid) { (byCat[cid] = byCat[cid] || []).push(guests[i]); }
      else { uncat.push(guests[i]); }
    }
    // [ROUNDFIX2e #3] `open` controls the disclosure default: an open section omits `hidden` and starts
    // aria-expanded='true'. User categories are ALWAYS closed; the "ללא סיווג" bucket opens by default
    // ONLY when there are no user categories (so all guests are visible under it immediately).
    function section(label, rows, uncatCls, pidSuffix, open) {
      var pid = 'catbody-' + key + '-' + pidSuffix;
      return '<div class=\'cat-group' + (uncatCls ? ' cat-uncat' : '') + '\'>'
        + '<h3 class=\'cat-toggle\' role=\'button\' tabindex=\'0\' data-cat-toggle=\'' + esc(pid) + '\''
        +   ' aria-expanded=\'' + (open ? 'true' : 'false') + '\' aria-controls=\'' + esc(pid) + '\'>'
        +   '<span>' + esc(label) + '</span><span class=\'cat-count\'>' + bdi(rows.length) + '</span></h3>'
        + '<div class=\'cat-group-body\' id=\'' + esc(pid) + '\'' + (open ? '' : ' hidden') + '>' + _catGuestRowsHtml(rows, readOnly) + '</div>'
        + '</div>';
    }
    var h = '';
    // One section per category (empty ones included, per R4A + §0.4) — always CLOSED by default.
    for (var c = 0; c < categories.length; c++) {
      var cat = categories[c];
      h += section(cat.name, byCat[cat.cat_id] || [], false, 'c' + c, false);
    }
    // Uncategorised bucket — always LAST; OPEN by default only when it is the ONLY group (no user categories).
    h += section('ללא סיווג', uncat, true, 'uncat', categories.length === 0);
    return h;
  }

  // R4A: the grouped "חלוקה לקטגוריות" view - EVERY rsvp'd guest-party of the (target) owner, grouped by
  // that owner's dynamic categories. Writable own-view: manager + action-bar wrap the shared core.
  function categoryGroupedHtml() {
    // Collect the owner's guests, scoped to the SAME sid-set the super's act-as view would show, so a
    // primary's own "כולם" === the super acting-as that primary (R4C "בדיוק כמה שהוא מוצג אצלו"):
    //   - COMBINED super board: guests come from the combined payload (groom+bride+unassigned). When
    //     CAT_OWNER is set the SERVER already narrowed the payload to that owner (SENDER_ID===owner),
    //     so no client filter is needed - just use all.
    //   - OWN board [N2]: guests come from D.rows; scope to SENDER_ID===selfSid() (personal rows are
    //     already own-sid only; a side board's D.rows spans the whole side, so filter to the caller's
    //     own sid here so the scope matches the super's act-as-of-this-organiser exactly).
    var all;
    if (IS_SUPER) {
      all = [].concat(D.groomRows || [], D.brideRows || [], D.unassigned || []);
    } else {
      var _self = selfSid();
      all = (D.rows || []).filter(function (g) { return String(g.sender_id || '') === _self; });
    }
    var cats = (CAT_DATA && CAT_DATA.categories) || [];
    // manager + action-bar are OWN-VIEW write controls, emitted OUTSIDE the shared read-only core
    // (readOnly=false) so the grouping structure stays identical for both views.
    return categoryManagerHtml()
      + categoryGroupedFrom(all, cats, CAT_ASSIGN, false, 'own')
      + categoryActionBarHtml();
  }

  // [CATEGORIES-FEATBATCH2 N1+N3] the purple per-organiser tab bar for a PRIMARY's side board. One tab
  // per side-organiser (default CLOSED); each panel body renders that organiser's guests grouped by
  // THAT organiser's OWN categories, READ-ONLY (FIX-B: wrapped in a .cat-ro / data-readonly='1' wrapper
  // so wireCategoryControls skips any write control inside; the readOnly renderer emits none anyway).
  // Reuses the existing delegated .org-tab handler via data-org-side='sideorg' (distinct key → ids never
  // collide with combined groom/bride). N4 collapse applies inside each panel automatically.
  // [N1-PERSONAL] When the primary is on their PERSONAL board, D.breakdown is absent; fall back to
  // SIDE_BREAKDOWN (fetched lazily by fetchSideBreakdown when the button is clicked). Show a "טוען…"
  // placeholder if the fetch hasn't returned yet (SIDE_BREAKDOWN===null, not yet resolved).
  function sideOrgTabsHtml() {
    var bd = (D.breakdown && D.breakdown.length) ? D.breakdown : (SIDE_BREAKDOWN || []);
    if (!bd.length) {
      if (SIDE_BREAKDOWN === null) { return '<p style=\'color:#777\'>&#8987; טוען מארגנים…</p>'; }
      return '<p style=\'color:#777\'>אין מארגנים להצגה.</p>';
    }
    // [ROUNDFIX2b #5] ACCORDION: each organiser header is IMMEDIATELY followed by its own (collapsed)
    // panel, so clicking a name opens that organiser's categories/guests RIGHT BELOW the name (not at the
    // end of the list); clicking the same name again closes it. The delegated .org-tab handler toggles
    // in-place for data-org-side='sideorg' (vs the exclusive tab behaviour kept for the combined view).
    var h = '<div class=\'org-tabs org-acc\' role=\'tablist\'>';
    for (var i = 0; i < bd.length; i++) {
      var org = bd[i];
      var tabId = 'orgtab-sideorg-' + i;
      var panId = 'orgpanel-sideorg-' + i;
      var lbl = esc(org.name || org.sender_id || ('מארגן ' + (i + 1)));
      var oc = (SIDE_CAT && SIDE_CAT.byOwner && SIDE_CAT.byOwner[org.sender_id]) || { categories: [], assignments: [] };
      var amap = {};
      (oc.assignments || []).forEach(function (a) { amap[String(a.dedupe_key)] = String(a.cat_id); });
      h += '<button type=\'button\' class=\'org-tab org-acc-head\' role=\'button\''
        + ' id=\'' + tabId + '\''
        + ' data-org-side=\'sideorg\''

        + ' id=\'' + panId + '\''
        + ' aria-labelledby=\'' + tabId + '\' hidden>'

  // [ROUNDFIX-20260708] mutual-exclusivity: the records area is EXACTLY one of
  // {default | MINE | UNCONF | CAT | SIDE_ORG}. Every view-switch button clears all first.
  function _clearViews() {

  // [FIXLIST-R3b B 2026-07-10] "תצוגת שורות ועמודות" (ta-list) toggles body.force-table — a real
  // rows/columns table (below 768px). But the board now DEFAULTS to MINE_VIEW (cards), and mineGuestsHtml
  // emits .mine-card divs, NOT a .data-table, so force-table CSS had nothing to act on and the user still
  // saw vertical cards. When force-table is ON we therefore skip the MINE card branch and fall through to
  // the plain guest TABLE (else-branch guestTable), which force-table CSS turns into the rows/columns list;
  // toggling OFF restores the card view. Read straight off the body class so no extra state is needed.
  function _isForceTable() { return document.body.classList.contains('force-table'); }

  // [ROUNDFIX-20260708 #1ב] "האורחים שלי" — ONLY the viewer's own guests (own-sid scope), nothing else
  // (no per-organiser breakdown, no unconfirmed data). On a personal board D.rows is already own-only;
  // on a primary's SIDE board D.rows spans the whole side, so filter to selfSid() here.
  // [ROUNDFIX2g-20260709 #4/#5] MINE_VIEW is CARD-based (mirrors the "מי לא אישר" cards): each guest
  // card carries a category combobox (assign/unassign, keyed by dedupe_key) + a floating icon bar
  // (＋ add / ✏ rename / 🗑 delete category). A category FILTER bar sits above the attending filter,
  // one-shot-defaulting to the category holding the MOST of my guests.
  var MINE_CAT_FILTER = '';          // '' = all · '__uncat__' = ללא סיווג · else a cat_id
  var _mineCatDefaultApplied = false;
  // [MINE-MUT 2026-07-12] third MINE filter bar: SOURCE (how the guest entered the list).
  // '' = all · 'manual' = נוסף ידנית (channel==='manual') · 'auto' = נוסף אוטומטית (channel!=='manual').
  // AND-combined with the category + attending filters. No one-shot default (always starts 'הכל').
  var MINE_SRC_FILTER = '';
  // [MINEFILTER 2026-07-12] pending "focus after a MANUAL organiser action" request. Set ONLY by the
  // explicit manual-op handlers (add / update / delete / category assign-unassign), NEVER by the
  // automatic wedding-refresh (check_updates) poll. Shape: '' (none) | { rid:'…' } | { dk:'…' }.
  // The MINE render consumes it once: it resets the filter to "הכל" and smooth-scrolls + highlights
  // the matching card. rid = response_id (add/update); dk = dedupe_key (category assign/unassign).
  var _mineFocusReq = null;
  // [MINEFILTER 2026-07-12] a manual op is a two-step async (server call → refresh → re-render). We
  // mark the reset-to-הכל the moment the manual op fires; the focus target rides in _mineFocusReq.
  function _mineManualReset(focus) {
    MINE_CAT_FILTER = ''; MINE_SRC_FILTER = ''; FILTER = 'all';   // back to the master "הכל" state
    _mineFocusReq = focus || null;
  }
  // [MINEFILTER 2026-07-12] consume a pending manual-action focus once, after the MINE cards render.
  // Locates the changed guest's card (by response_id or dedupe_key), smooth-scrolls to it and adds a
  // brief highlight so an older organiser SEES their action landed on that specific guest. Safe no-op
  // if no request is pending, the MINE view isn't showing, or the card can't be found (e.g. a delete).
  // [MINESCROLL 2026-07-12] returns true iff it actually focused+scrolled a changed guest's card, so
  // the caller can SUPPRESS the filter/entry auto-scroll — a manual guest change must win the scroll.
  function _consumeMineFocus(out) {
    var req = _mineFocusReq;
    _mineFocusReq = null;                      // consume once, regardless of outcome
    if (!req || !out) { return false; }
    try {
      var sel = null;
      if (req.rid) { sel = out.querySelector('.mine-card[data-mine-card-rid="' + String(req.rid).replace(/"/g, '') + '"]'); }
      if (!sel && req.dk) { sel = out.querySelector('.mine-card[data-mine-card-dk="' + String(req.dk).replace(/"/g, '') + '"]'); }
      if (!sel) { return false; }              // card gone (e.g. deleted guest) → reset already happened
      if (sel.scrollIntoView) { sel.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      sel.classList.add('mine-focus');
      setTimeout(function () { try { sel.classList.remove('mine-focus'); } catch (e) {} }, 3400);
      return true;
    } catch (e) {}
    return false;
  }
  // [MINESCROLL 2026-07-12] consume a pending MINE auto-scroll (LEVEL 1 on entry, LEVEL 2 on filter),
  // once per render, AFTER _consumeMineFocus. `focused` = a manual guest change already grabbed the
  // scroll this render → we defer to it and just clear our own pending flags (no double-scroll).
  function _consumeMineAutoScroll(out, focused) {
    var wantEntry = _mineEntryPending, wantFilter = _mineFilterPending;
    _mineEntryPending = false; _mineFilterPending = false;
    if (!out || !MINE_VIEW) { return; }
    _mineBindScrollListener();
    if (focused) { return; }                   // manual-op focus wins the scroll (see COEXISTENCE)
    if (wantEntry) {
      var hd = out.querySelector('#mine-heading');
      if (hd) { _mineScrollToLevel(hd, 1); }   // LEVEL 1: heading to top
    } else if (wantFilter) {
      // LEVEL 2: bring the "back-up" arrow ROW to the top of the viewport (NOT the first card) — the
      // arrow sits just above the first card, so targeting the row keeps the arrow visible with the
      // first card directly below it. Fallbacks: cards block, then its first card.
      var row   = out.querySelector('.mine-backup-row');
      var cards = out.querySelector('#mine-cards');
      var target = row || (cards ? (cards.querySelector('.mine-card') || cards) : null);
      if (target) { _mineScrollToLevel(target, 2); }
    }
  }

  function _mineList() {
    var self = selfSid();
    return (D.rows || []).filter(function (g) { return !self || String(g.sender_id || '') === self; });
  }
  function _catNameById(cid) {
    var cats = (CAT_DATA && CAT_DATA.categories) || [];
    for (var i = 0; i < cats.length; i++) { if (String(cats[i].cat_id) === String(cid)) { return cats[i].name; } }
    return '';
  }
  // per-category counts of MY guests, via the client-side join map CAT_ASSIGN[dedupe_key].
  function _mineCatCounts(mine) {
    var by = {}, uncat = 0;
    for (var i = 0; i < mine.length; i++) {
      var cid = CAT_ASSIGN[String(mine[i].dedupe_key || '')] || '';
      if (cid) { by[cid] = (by[cid] || 0) + 1; } else { uncat++; }
    }
    return { by: by, uncat: uncat };
  }
  function mineGuestsHtml() {
    var mine = _mineList();
    var cats = (CAT_DATA && CAT_DATA.categories) || [];
    // if the active filter points at a category that no longer exists (e.g. just deleted), reset to all.
    if (MINE_CAT_FILTER && MINE_CAT_FILTER !== '__uncat__' && !_catNameById(MINE_CAT_FILTER)) { MINE_CAT_FILTER = ''; }
    // [#5] one-shot default: preselect the category with the most of my guests (uncat counts too).
    // [FIX 2026-07-09] Only lock the default ONCE categories are actually loaded — the first render
    // fires while fetchCategories() is still in flight (CAT_DATA empty), and locking then would pin the
    // filter to "__uncat__" for the whole session (hiding categorised guests). Deferring to the loaded
    // render fixes it; if the organiser has no categories at all, MINE_CAT_FILTER stays '' (show all).
    if (!_mineCatDefaultApplied && catUiEnabled() && CAT_DATA && CAT_DATA.categories && CAT_DATA.categories.length) {
      _mineCatDefaultApplied = true;
      // [FIXLIST-R3 #3 2026-07-10] while the onboarding simulation is about to run (first 3 opens), the
      // default is "הכל" so the teaching scroll shows the first 7 of ALL my guests, exactly as asked.
      // Once onboarding is exhausted, the normal "most-of-my-guests" default (#5) resumes.
      // [MINEDEFAULT 2026-07-12] one-shot default is ALWAYS "הכל" (show all). We no longer
      // auto-preselect the category with the most of my guests; the first render shows every
      // guest, and the user picks a category chip explicitly if they want to filter.
      MINE_CAT_FILTER = '';
    }
    // apply the category filter, then the SOURCE filter, then the existing attending filter.
    // All three are AND-combined (a guest shows only if it passes every active bar).
    var shown = mine;
    if (MINE_CAT_FILTER === '__uncat__') { shown = mine.filter(function (g) { return !CAT_ASSIGN[String(g.dedupe_key || '')]; }); }
    else if (MINE_CAT_FILTER)           { shown = mine.filter(function (g) { return String(CAT_ASSIGN[String(g.dedupe_key || '')] || '') === MINE_CAT_FILTER; }); }
    // [MINE-MUT 2026-07-12] SOURCE filter (channel-based). manual → channel==='manual'; auto → the rest.
    if (MINE_SRC_FILTER === 'manual')    { shown = shown.filter(function (g) { return String(g.channel || '') === 'manual'; }); }
    else if (MINE_SRC_FILTER === 'auto') { shown = shown.filter(function (g) { return String(g.channel || '') !== 'manual'; }); }
    shown = filterRows(shown);
    // [MINEFILTER 2026-07-12] "no filter applied" = the master "הכל" state (every group at all).
    var _allActive = (!MINE_CAT_FILTER && !MINE_SRC_FILTER && FILTER === 'all');
    var _master = '<div class=\'mine-master-all\'>'
      + '<button type=\'button\' class=\'mine-master-btn' + (_allActive ? ' active' : '')
      + '\' data-mine-master=\'1\'>הכל<span class=\'mmb-n\'>' + bdi(mine.length) + '</span></button>'
      + '</div>';
    return '<h2 class=\'mine-anchor\' id=\'mine-heading\'>האורחים שלי</h2>'
      + _master
      + mineCatFilterHtml(mine)
      + mineSrcFilterHtml(mine)
      + '<span class=\'mine-filter-cap\'>סטטוס הגעה</span>'
      + filterBarHtml(true)
      // [MINESCROLL 2026-07-12] centered "back-up" arrow row, ABOVE the cards. Hidden by default
      // (.mine-backup-arrow has no .show); JS toggles .show only after a PROGRAMMATIC auto-scroll.
      + '<div class=\'mine-backup-row\'>'
      +   '<button type=\'button\' class=\'mine-backup-arrow\' id=\'mine-backup-arrow\' data-mine-backup=\'1\' aria-label=\'חזרה למעלה\' title=\'חזרה למעלה\'>&#8593;</button>'
      + '</div>'
      + '<div class=\'mine-cards mine-anchor\' id=\'mine-cards\'>' + mineCardsHtml(shown) + '</div>';
  }
  // [MINE-MUT 2026-07-12] SOURCE filter bar (mirrors mineCatFilterHtml). class mine-srcfilter /
  // .msf-chip / data-minesrcflt. Chips: הכל / נוסף ידנית / נוסף אוטומטית, each with a live count.
  // Shown whenever the MINE view is shown (not gated on catUiEnabled - source applies to everyone).
  function mineSrcFilterHtml(mine) {

  // [#5] category filter bar above the attending filter; a chip per category with a live count.
  function mineCatFilterHtml(mine) {
    if (!catUiEnabled()) { return ''; }
    var cats = (CAT_DATA && CAT_DATA.categories) || [];
    var cc = _mineCatCounts(mine);
    function chip(v, lbl, n) {

  // [#4] one MINE card: guest facts + category combobox (data-dk=dedupe_key) + floating ＋/✏/🗑 icons.
  function mineCardsHtml(rows) {
    rows = rows || [];
    if (!rows.length) { return '<div class=\'uc-empty\'>אין אורחים בתצוגה זו. &#128077;</div>'; }
    var cats = (CAT_DATA && CAT_DATA.categories) || [];
    var enable = catUiEnabled();
    // [FIXLIST1 2026-07-10] one stacked data row (small label above the value; the CSS draws the
    // horizontal separator line between consecutive rows).
    function _mrow(k, v, vCls) {
      return '<div class=\'uc-row\'><span class=\'uc-k\'>' + k + '</span><span class=\'uc-v' + (vCls ? ' ' + vCls : '') + '\'>' + v + '</span></div>';
    }
    var h = '';
    for (var i = 0; i < rows.length; i++) {
      var g = rows[i];
      var dk = String(g.dedupe_key || '');
      var curCat = CAT_ASSIGN[dk] || '';
      var att = (g.attending === true || String(g.attending).toLowerCase() === 'true');
      // [FIXLIST1 2026-07-10] raw counts exactly as the category-view row builder shows them
      // (_catGuestRowsHtml: bdi(men_count)/bdi(women_count), attending-independent).
      var men = Number(g.men_count) || 0;
      var women = Number(g.women_count) || 0;
      // [MINE-MUT 2026-07-12] per-card manual-guest actions (מחק / עדכן) - rendered ONLY for a
      // manually-added guest (channel==='manual'). NEVER on an auto/RSVP card. data-rid = response_id
      // (the server matches + scope-guards on it); data-mine-act routes to the delete/update handlers.
      var manualActions = '';
      if (String(g.channel || '') === 'manual') {
        var rid = String(g.response_id || '');
        manualActions = '<div class=\'mine-manual-actions\'>'
          + '<button type=\'button\' class=\'mine-act-btn mine-act-update\' data-mine-act=\'update\' data-rid=\'' + esc(rid) + '\'>&#9999;&#65039; עדכן</button>'
          + '<button type=\'button\' class=\'mine-act-btn mine-act-delete\' data-mine-act=\'delete\' data-rid=\'' + esc(rid) + '\'>&#128465;&#65039; מחק</button>'
          + '</div>';
      }
      var catRow = '';
      if (enable) {
        var opts = '<option value=\'\'>— ללא סיווג —</option>';
        for (var c = 0; c < cats.length; c++) {
          var sel = (String(cats[c].cat_id) === String(curCat)) ? ' selected' : '';
          opts += '<option value=\'' + esc(cats[c].cat_id) + '\'' + sel + '>' + esc(cats[c].name) + '</option>';
        }

          + '<select class=\'uc-cat-sel mine-cat-sel\' data-dk=\'' + esc(dk) + '\'>' + opts + '</select>'
          + '<span class=\'cat-iconbar\'>'
          +   '<button type=\'button\' class=\'cat-ic mine-cat-ic\' data-icat=\'add\' title=\'הוסף קטגוריה חדשה\'>&#10133;</button>'
          +   '<button type=\'button\' class=\'cat-ic mine-cat-ic\' data-icat=\'rename\' title=\'שנה שם קטגוריה שנבחרה\'>&#9999;&#65039;</button>'
          +   '<button type=\'button\' class=\'cat-ic mine-cat-ic\' data-icat=\'delete\' title=\'מחק קטגוריה שנבחרה\'>&#128465;&#65039;</button>'
          + '</span>'
          + '</div>';
      }
      // [FIXLIST1 2026-07-10] COMPLETE field set on every MINE card. The authoritative list is
      // derived from the category-view row builder (_catGuestRowsHtml) + the guest-table fields
      // (guestRow) the user listed: גברים, נשים, סה״כ, טלפון, ערוץ-ההגעה, תאריך-האישור, וברכה אם
      // קיימת. Labels reuse the exact existing table wording ('נשלח דרך' / 'מתי אישר'). 'נשלח ע"י'
      // is deliberately omitted - the MINE view is own-guests-only, so it is always the viewer
      // themselves. The old compressed 'כמות' row is superseded by the granular גברים/נשים/סה״כ
      // rows (same numbers, fuller). Design (colors/shape/combobox/iconbar/chips) untouched.
      // [MINEFILTER 2026-07-12] card carries its dedupe_key + response_id so the manual-action focus
      // helper can locate + scroll-to + highlight the exact guest that just changed.
      h += '<div class=\'uc-card mine-card\' data-mine-card-dk=\'' + esc(dk) + '\' data-mine-card-rid=\'' + esc(String(g.response_id || '')) + '\'>'
        + _mrow('שם', esc(g.guest_name), 'uc-name-v')
        + _mrow('סטטוס', att ? 'מגיע/ה &#9989;' : 'לא מגיע/ה')
        + _mrow('גברים', bdi(men))
        + _mrow('נשים', bdi(women))
        + _mrow('סה״כ', bdi(men + women))
        + _mrow('טלפון', g.phone ? bdi(g.phone) : '<span class=\'muted\'>-</span>')
        + _mrow('נשלח דרך', esc(channelLabel(g.channel)))
        + _mrow('מתי אישר', g.timestamp ? bdi(fmtDateTimeIL(g.timestamp)) : '<span class=\'muted\'>-</span>')
        + ((g.blessing && String(g.blessing).trim()) ? _mrow('ברכה', esc(g.blessing), 'mine-pre') : '')

    return h;

  // [ROUNDFIX2 #3] build the category-grouped cards from the cached UNCONF_PEOPLE, honoring UNCONF_FILTER.
  function _unconfCardsHtml() {
    var people = (UNCONF_PEOPLE || []).filter(function (p) {
      if (UNCONF_FILTER === 'notopened') { return p.status === 'notopened'; }
      if (UNCONF_FILTER === 'opened')    { return p.status === 'opened'; }

    var cats = (CAT_DATA && CAT_DATA.categories) || [];

    for (var c = 0; c < cats.length; c++) { known[String(cats[c].cat_id)] = true; }
    var buckets = {}, uncat = [];
    for (var i = 0; i < people.length; i++) {
      var cid = String(people[i].cat_id || '');

    for (var ci = 0; ci < cats.length; ci++) {
      var rows = buckets[String(cats[ci].cat_id)] || [];
      if (rows.length) { h += _unconfGroupHtml(cats[ci].name, rows); }

      }

    // [ROUNDFIX2c #5ב] stacked rows (label above value) for clean, aligned, readable cards.

    if (_onbStarted) { return false; }
    var seen = 0;
    try { seen = parseInt(localStorage.getItem(_onbKey()) || '0', 10) || 0; } catch (e) {}   // [FIXLIST-R3b A1] per-sid
    return seen < ONB_MAX;
  }
  function _maybeRunOnboarding() {
    if (_onbStarted) { return; }               // once per page-load, whichever render wins
    // [FIXLIST-R3c 2026-07-11] DO NOT consume the one-shot guard here. For a regular organiser whose
    // guest board first paints EMPTY (an intermediate/pre-data render) and only fills on a later render,
    // setting _onbStarted up-front made that empty render "eat" the single run: the empty pass hit the
    // no-items skip below and returned, and the later data-populated render then early-returned above
    // (_onbStarted already true) → the sim NEVER ran for a regular organiser. Fix: the guard is consumed
    // ONLY when a run actually STARTS (items present + counter not exhausted), just before _runOnboarding.
    var _oc = document.getElementById('dashboard-content');
    // [FIXLIST-R3b A2 2026-07-10] the scrollable guest items depend on the board:
    //   • primary/super default (MINE_VIEW)  → .mine-card divs (unchanged behaviour)
    //   • REGULAR organiser default list     → the guest-table data rows (skip the <th> header row)
    // So a regular organiser (whose default board is the plain guestTable, never MINE_VIEW) also gets the
    // teaching scroll. If there are zero guest items on either board, skip (never counts).
    var items = _oc ? _oc.querySelectorAll('.mine-card') : null;
    if (!items || !items.length) {
      var rows = _oc ? _oc.querySelectorAll('.data-table tr') : null;
      if (rows && rows.length) {
        var arr = [];
        for (var r = 0; r < rows.length; r++) { if (rows[r].querySelector('td')) { arr.push(rows[r]); } }  // data rows only
        items = arr;
      }
    }
    if (!items || !items.length) { return; }   // no data to teach-scroll to → skip (never counts, guard NOT consumed)
    var seen = 0;
    try { seen = parseInt(localStorage.getItem(_onbKey()) || '0', 10) || 0; } catch (e) {}   // [FIXLIST-R3b A1] per-sid
    if (seen >= ONB_MAX) { return; }
    // [FIXLIST-R3c 2026-07-11] a run is genuinely starting → NOW consume the once-per-page-load guard.
    _onbStarted = true;
    try { localStorage.setItem(_onbKey(), String(seen + 1)); } catch (e) {}   // count this run up-front (per-sid)
    _runOnboarding(items);
  }
  // [FIXLIST-R3b A2] `cards` is any array-like of guest items (mine-cards OR guest-table rows) whose
  // elements support getBoundingClientRect — the scroll math is identical for both.
  function _runOnboarding(cards) {
    var docEl = document.scrollingElement || document.documentElement;
    // click-blocker for exactly 5s (transparent → buttons still visible; blocks taps + touch-scroll)
    var ov = document.createElement('div'); ov.id = 'onb-overlay';
    ov.addEventListener('touchmove', function (e) { try { e.preventDefault(); } catch (x) {} }, { passive: false });
    document.body.appendChild(ov);
    // [FIXLIST-R3b A2] blink the most-relevant existing button ("האורחים שלי", present for regular +
    // primary alike); if it is absent (edge board), skip the blink gracefully (guard below).
    var mineBtn = document.getElementById('ta-mine-btn');
    if (mineBtn) { mineBtn.classList.add('onb-blink'); }
    // deterministic fixed-duration scroll (easeInOutQuad) so the whole timeline is exact
    function _animScroll(toY, dur, done) {
      var fromY = docEl.scrollTop || 0, t0 = null;
      function step(ts) {
        if (t0 === null) { t0 = ts; }
        var p = Math.min(1, (ts - t0) / dur);
        var e = (p < 0.5) ? (2 * p * p) : (1 - Math.pow(-2 * p + 2, 2) / 2);
        try { docEl.scrollTop = fromY + (toY - fromY) * e; } catch (x) {}
        if (p < 1) { requestAnimationFrame(step); } else if (done) { done(); }
      }
      requestAnimationFrame(step);
    }
    var idx = Math.min(6, cards.length - 1);   // the 7th card (0-based 6), or the last if fewer than 7
    var target = cards[idx];
    // t=2000ms: stop the blink, scroll DOWN (~1300ms) so the 7th card's bottom is on screen
    setTimeout(function () {
      if (mineBtn) { mineBtn.classList.remove('onb-blink'); }
      var toY = 0;
      try { var r = target.getBoundingClientRect(); toY = (docEl.scrollTop || 0) + r.bottom - (window.innerHeight || 600) + 24; } catch (e) {}
      if (toY < 0) { toY = 0; }
      _animScroll(toY, 1300, function () {
        setTimeout(function () { _animScroll(0, 1300); }, 350);   // brief hold, then back UP (~1300ms)
      });
    }, 2000);
    // master timer: release the board at EXACTLY 5000ms, no matter where the scroll is
    setTimeout(function () {
      if (mineBtn) { mineBtn.classList.remove('onb-blink'); }
      if (ov && ov.parentNode) { ov.parentNode.removeChild(ov); }
      try { docEl.scrollTop = 0; } catch (e) {}
    }, 5000);
  }

  // ===== CATEGORIES-FEATBATCH wiring (R4A/R4B/R4C) =====
  function _catMsg(text, kind) {
    var m = document.getElementById('cat-msg');
    if (!m) { return; }
    m.textContent = text || '';
    m.className = (kind || '');
  }

  // Fetch mode=categories for the current (target) owner, then re-render.
  // [A4] Available to the super AND to a primary on their own board. A non-super primary passes
  // CAT_OWNER='' so getCategoriesData defaults owner=caller's own sid server-side (own-set only).
  function fetchCategories(thenRender) {
    if (!catUiEnabled()) { return; }
    runScript('getCategoriesData', TOKEN, CAT_OWNER, AUTH_PHONE)
      .then(function (res) {
        if (res && res.ok) {
          CAT_DATA = { categories: res.categories || [], assignments: res.assignments || [] };
          _rebuildAssignMap();
        }
        if (thenRender) { renderData(D); }
      }, function () { if (thenRender) { renderData(D); } });
  }

  // [CATEGORIES-FEATBATCH2 N3] fetch the side-scoped read-only categories (mode=side_categories) ONCE,
  // cache byOwner keyed by sender_id, then re-render. Mirrors fetchCategories; authorised server-side by
  // the SAME primary+phone factor the side board already enforces (getSideCategoriesData). Never throws.
  function fetchSideCategories(thenRender) {
    runScript('getSideCategoriesData', TOKEN, AUTH_PHONE)
      .then(function (res) {
        if (res && res.ok) { SIDE_CAT = { byOwner: res.byOwner || {} }; SIDE_CAT_LOADED = true; }
        if (thenRender) { renderData(D); }
      }, function () { if (thenRender) { renderData(D); } });
  }

  // [CATEGORIES-FEATBATCH2 N1-PERSONAL] fetch the side-board breakdown (organiser list + guests) for a
  // primary who is viewing their PERSONAL board (D.breakdown absent on personal payload). Uses the same
  // getDashboardData(TOKEN, 'side', AUTH_PHONE) call the side board makes — the promoted primary IS
  // authorised server-side (is_primary + phone gated, read-only). Stores .breakdown into SIDE_BREAKDOWN
  // and re-renders so sideOrgTabsHtml can build the tab bar. Called ONCE (guard: SIDE_BREAKDOWN===null).
  // Never throws: failure handler re-renders with SIDE_BREAKDOWN still null → "אין מארגנים" fallback.
  function fetchSideBreakdown() {
    runScript('getDashboardData', TOKEN, 'side', AUTH_PHONE)
      .then(function (res) {
        if (res && res.breakdown) { SIDE_BREAKDOWN = res.breakdown; }
        else { SIDE_BREAKDOWN = []; }   // resolved but empty — stop showing "טוען…"
        renderData(D);
      }, function () {
        SIDE_BREAKDOWN = [];            // mark resolved so placeholder doesn't spin forever
        renderData(D);
      });
  }

  // POST a categoryOp; on success refresh categories + re-render. `optimisticSel` keeps the
  // current selection when appropriate (assign/unassign keep it; delete/create clear msg).
  function postCategoryOp(body) {
    body.action = 'categoryOp';
    body.token = TOKEN;
    // [CATEGORIES-FEATBATCH M2] carry the session phone so the owner-token super path passes the
    // categoryOp phone-gate that now mirrors the combined-read gate. AUTH_PHONE is seeded from
    // PHONE_PREFILL on the combined super path (empty for a MASTER_TOKEN caller, which is phone-less;
    // empty too for a lower-role primary, whose own-sid resolution never needs a phone). Without this
    // the super's OWN create/assign would fail the new gate.
    body.phone = AUTH_PHONE;
    if (CAT_OWNER) { body.owner_sid = CAT_OWNER; }
    runScript('categoryOp', body)
      .then(function (res) {
        if (res && res.ok) {
          // [CATEGORIES-FEATBATCH2 N5] ROOT-CAUSE FIX for the ~5-click add: the server already returned
          // the fresh authoritative list in res.categories. For create/rename/delete render IMMEDIATELY
          // from res (no second async fetchCategories hop that lags + re-wires a fresh #cat-add-btn mid-
          // flight). Only assign/unassign genuinely change the join map → keep the authoritative refetch.
          CAT_DATA.categories = res.categories || CAT_DATA.categories;
          if (body.op === 'create' || body.op === 'rename') {
            // [FIXLIST-R3 #1 2026-07-10] create FROM a guest card carries dedupe_keys → the server
            // auto-assigned them to the new cat_id (res.cat_id) atomically. Fold that assignment into
            // CAT_DATA.assignments BEFORE _rebuildAssignMap so the guest's combobox shows the new
            // category immediately, with no extra fetch and no second click. Plain manager-create
            // carries no dedupe_keys → this block is skipped and it behaves exactly as before.
            if (body.op === 'create' && body.dedupe_keys && body.dedupe_keys.length && res.cat_id) {
              CAT_DATA.assignments = CAT_DATA.assignments || [];
              for (var _ai = 0; _ai < body.dedupe_keys.length; _ai++) {
                var _adk = String(body.dedupe_keys[_ai] || '');
                if (!_adk) { continue; }
                CAT_DATA.assignments = CAT_DATA.assignments.filter(function (a) { return String(a.dedupe_key) !== _adk; });
                CAT_DATA.assignments.push({ dedupe_key: _adk, cat_id: res.cat_id });
              }
            }
            // create/rename NEVER change assignments (except the create+assign case handled above)
            // → CAT_DATA/join map already authoritative.
            _rebuildAssignMap(); renderData(D);
          } else if (body.op === 'delete') {
            // drop the deleted cat_id from assignments so no orphan lingers (server cascaded the
            // junction rows in-lock), then render from the authoritative categories.
            var _del = body.cat_id;
            CAT_DATA.assignments = (CAT_DATA.assignments || []).filter(function (a) { return String(a.cat_id) !== String(_del); });
            _rebuildAssignMap(); renderData(D);
          } else {
            // assign/unassign: the join map genuinely changed → authoritative refetch.
            fetchCategories(true);
          }
        } else {
          _catMsg((res && res.error) ? res.error : 'שגיאה', 'err');
          _reenableAddBtn();   // [N5] failed op does NOT re-render → un-stick the in-flight guard
        }
      }, function () { _catMsg('שגיאה בשליחה, נסה שוב', 'err'); _reenableAddBtn(); });
  }

  // [CATEGORIES-FEATBATCH2 N5] re-enable the add button after a FAILED op (success re-renders a fresh
  // button, so this is only needed on the error/failure paths where no renderData runs).
  function _reenableAddBtn() {
    var b = document.getElementById('cat-add-btn');
    if (b) { b.disabled = false; }
  }

  function _selectedKeys() {
    var out = [];
    for (var k in CAT_SEL) { if (CAT_SEL.hasOwnProperty(k) && CAT_SEL[k]) { out.push(k); } }
    return out;
  }
  function _syncActionBar() {
    var bar = document.getElementById('cat-actionbar');
    var n = _selectedKeys().length;
    var cn = document.getElementById('ab-count-n');
    if (cn) { cn.textContent = String(n); }
    if (bar) { if (n > 0) { bar.classList.add('open'); } else { bar.classList.remove('open'); } }
  }

  function wireCategoryControls() {
    // [A4] wire for the super OR a primary on their own board. Regular organisers render no category
    // DOM (catUiEnabled false), so there is nothing to wire and we bail early.
    if (!catUiEnabled()) { return; }

    // R4A: "כולם" toggle - enter the grouped view (fetch categories first if empty). Present for a
    // primary's own board too (the button is rendered by topActionsHtml under catUiEnabled).
    var taAll = document.getElementById('ta-all-btn');
    if (taAll) {
      taAll.addEventListener('click', function () {
        var wasOn = CAT_VIEW;
        _clearViews();                                  // mutual exclusivity (FIX-A superset)
        if (wasOn) { renderData(D); return; }           // toggle OFF → back to default
        CAT_VIEW = true; _scrollPending = true;
        // [ROUNDFIX-20260708 #2] render IMMEDIATELY so the view switches without waiting on the server;
        // the fetch below fills the categories then re-renders.
        renderData(D);
        if ((!CAT_DATA.categories || CAT_DATA.categories.length === 0) && !CAT_DATA.assignments.length) {
          fetchCategories(true);
        }
      });
    }

    // R4C: side buttons + back-to-all are SUPER-ONLY act-as (owner_sid re-scope). A primary's own
    // board never renders these (sideActBtnsHtml is IS_SUPER-gated), and a non-super caller must
    // never pass owner_sid - so wire them only for the super.
    if (IS_SUPER) {
      var sideBtns = out_qsa('[data-actside]');
      for (var s = 0; s < sideBtns.length; s++) {
        (function (btn) {
          btn.addEventListener('click', function () { pickPrimaryForSide(btn.getAttribute('data-actside')); });
        })(sideBtns[s]);
      }
      var backAll = document.getElementById('ta-back-all');
      if (backAll) {
        backAll.addEventListener('click', function () {
          CAT_OWNER = '';
          CAT_SEL = {};
          loadOwnerBoard();   // reload the full combined board
        });
      }
    }

    // R4B: category manager - add. [CATEGORIES-FEATBATCH2 N5] in-flight guard: disable the button while
    // the create round-trips (mirrors the manual-add btn.disabled pattern) so rapid clicks can't fire
    // against a node being replaced. The button is destroyed on the next renderData, so re-enabling is
    // only needed on the FAILURE path (a failed create does NOT re-render); success re-renders a fresh
    // button. Combined with the immediate-render fix in postCategoryOp → one click adds the category.
    var addBtn = byIdRw('cat-add-btn');   // [FIX-B] never a read-only-wrapped node
    if (addBtn) {
      addBtn.addEventListener('click', function () {
        if (addBtn.disabled) { return; }
        var inp = document.getElementById('cat-new-name');
        var name = inp ? String(inp.value || '').trim() : '';
        if (!name) { _catMsg('יש להזין שם קטגוריה.', 'err'); return; }
        _catMsg('מוסיף…', '');
        addBtn.disabled = true;
        postCategoryOp({ op: 'create', name: name });
      });
    }
    // R4B: rename + delete (per-chip buttons). [FIX-B] RW-scoped so read-only wrappers are skipped.
    var rens = out_qsa_rw('.cat-rename');
    for (var r = 0; r < rens.length; r++) {
      (function (b) {
        b.addEventListener('click', function () {
          var cid = b.getAttribute('data-cat');
          // [FIXLIST5 2026-07-10] appModal.prompt replaces the native prompt - identical semantics
          // (null = ביטול); the whole continuation moved into .then, nothing runs before the answer.
          appModal.prompt('שם חדש לקטגוריה:').then(function (nm) {
            if (nm === null) { return; }
            nm = String(nm).trim();
            if (!nm) { _catMsg('שם ריק - בוטל.', 'err'); return; }
            _catMsg('משנה שם…', '');
            postCategoryOp({ op: 'rename', cat_id: cid, name: nm });
          });
        });
      })(rens[r]);
    }
    var dels = out_qsa_rw('.cat-del');
    for (var d = 0; d < dels.length; d++) {
      (function (b) {
        b.addEventListener('click', function () {
          var cid = b.getAttribute('data-cat');
          var nm = b.getAttribute('data-name') || '';
          // [FIXLIST5 2026-07-10] appModal.confirm replaces the native confirm - the delete runs
          // ONLY on אישור (true); ביטול/Escape (false) is a no-op, exactly like the old early-return.
          appModal.confirm('למחוק את הקטגוריה "' + nm + '"? האורחים לא יימחקו, רק השיוך יוסר.').then(function (ok) {
            if (!ok) { return; }
            _catMsg('מוחק…', '');
            postCategoryOp({ op: 'delete', cat_id: cid });
          });
        });
      })(dels[d]);
    }

    // R4B: multi-select checkboxes. [FIX-B] RW-scoped: the read-only side-org drill-in emits NO
    // .gc-check, and even if one ever appeared inside .cat-ro it would be skipped here.
    var checks = out_qsa_rw('.gc-check');
    for (var c = 0; c < checks.length; c++) {
      (function (chk) {
        chk.addEventListener('change', function () {
          var dk = chk.getAttribute('data-dk');
          if (chk.checked) { CAT_SEL[dk] = true; } else { delete CAT_SEL[dk]; }
          _syncActionBar();
        });
      })(checks[c]);
    }
    // R4B: action bar buttons. [FIX-B] byIdRw → never a read-only-wrapped #ab-* node.
    var abAssign = byIdRw('ab-assign-btn');
    if (abAssign) {
      abAssign.addEventListener('click', function () {
        var keys = _selectedKeys();
        if (!keys.length) { _catMsg('לא נבחרו אורחים.', 'err'); return; }
        var sel = document.getElementById('ab-select');
        var cid = sel ? sel.value : '';
        if (!cid) { _catMsg('בחר קטגוריה מהרשימה.', 'err'); return; }
        _catMsg('משייך ' + keys.length + ' אורחים…', '');
        CAT_SEL = {};
        postCategoryOp({ op: 'assign', cat_id: cid, dedupe_keys: keys });
      });
    }
    var abRemove = byIdRw('ab-remove-btn');
    if (abRemove) {
      abRemove.addEventListener('click', function () {
        var keys = _selectedKeys();
        if (!keys.length) { _catMsg('לא נבחרו אורחים.', 'err'); return; }
        _catMsg('מסיר סיווג מ-' + keys.length + ' אורחים…', '');
        CAT_SEL = {};
        postCategoryOp({ op: 'unassign', dedupe_keys: keys });
      });
    }
    var abClear = byIdRw('ab-clear-btn');
    if (abClear) {
      abClear.addEventListener('click', function () { CAT_SEL = {}; renderData(D); });
    }
    _syncActionBar();
  }

  // querySelectorAll scoped to the dashboard content (avoids the static panels).
  function out_qsa(sel) {
    var dc = document.getElementById('dashboard-content');
    return dc ? dc.querySelectorAll(sel) : [];
  }

  // [CATEGORIES-FEATBATCH2 FIX-B] querySelectorAll for WRITE controls only: identical to out_qsa but
  // filters out any node inside a read-only wrapper (.cat-ro / data-readonly='1'), so a category
  // manager / multi-select control that ever appears inside the N3 side-org drill-in is NEVER wired.
  // The readOnly renderer already emits zero write controls; this is the structural belt-and-braces.
  function out_qsa_rw(sel) {
    var all = out_qsa(sel);
    var out = [];
    for (var i = 0; i < all.length; i++) {
      var n = all[i];
      if (n && n.closest && n.closest('.cat-ro')) { continue; }   // skip read-only-wrapped write controls
      out.push(n);
    }
    return out;
  }
  // A getElementById-style lookup that returns null if the found node lives inside a read-only wrapper.
  function byIdRw(id) {
    var n = document.getElementById(id);
    if (n && n.closest && n.closest('.cat-ro')) { return null; }
    return n;
  }

  // R4C: choose a primary organiser of `side` from the loaded organiser list, then act-as.
  // The combined payload already carries breakdowns with sender_id+name per side; use them.
  function pickPrimaryForSide(side) {
    var bd = (side === 'groom') ? (D.groomBreakdown || []) : (D.brideBreakdown || []);
    if (!bd.length) { _catMsg('אין מארגנים בצד זה.', 'err'); return; }
    // Build a numbered picker. [FIXLIST5 2026-07-10] appModal.prompt replaces the native prompt -
    // identical semantics (null = ביטול; the modal's pre-wrap message renders the numbered lines);
    // the whole continuation moved into .then, so nothing act-as related runs before the answer.
    var lines = [];
    for (var i = 0; i < bd.length; i++) { lines.push((i + 1) + ') ' + (bd[i].name || bd[i].sender_id)); }
    appModal.prompt('בחר מארגן להצגת התצוגה שלו:\n' + lines.join('\n') + '\n\nהקלד מספר:').then(function (pick) {
      if (pick === null) { return; }
      var idx = parseInt(String(pick).trim(), 10) - 1;
      if (isNaN(idx) || idx < 0 || idx >= bd.length) { _catMsg('בחירה לא תקינה.', 'err'); return; }
      CAT_OWNER = String(bd[idx].sender_id || '');
      CAT_SEL = {};
      CAT_VIEW = true;   // acting-as opens straight into that owner's "כולם"/categories view
      loadOwnerBoard();
    });
  }

  // Reload the combined board (optionally scoped to CAT_OWNER) from the server, then its categories.
  function loadOwnerBoard() {
    runScript('getDashboardData', TOKEN, MODE, AUTH_PHONE, CAT_OWNER)
      .then(function (res) {
        if (res && !res.error) { D = res; fetchCategories(true); }
        else { _catMsg('אין גישה למארגן זה.', 'err'); }
      }, function () { _catMsg('שגיאה בטעינה.', 'err'); });
  }

  // [MINE-MUT 2026-07-12] the manual modal is now MODE-AWARE. _manualMode selects EVERY user-facing
  // string (title/subtitle/submit-btn/in-flight/success/"adding-for"), so nothing says הוסף/הוספה/חדש
  // in update mode. _manualEditRid carries the response_id of the guest being edited (update mode only).
  // The normal opener (ta-manual-btn → openManualAdd) always resets back to 'add'.
  var _manualMode = 'add';       // 'add' | 'update'
  var _manualEditRid = '';       // response_id being edited (update mode)

  // ── Manual-add: open the modal in ADD mode (clears fields + message each time)
  function openManualAdd() {
    _manualMode = 'add';
    _manualEditRid = '';
    var ov = document.getElementById('manual-overlay');
    if (!ov) { return; }
    document.getElementById('m-name').value = '';

  // [MINE-MUT 2026-07-12] open the manual modal in UPDATE mode, pre-filled from the guest identified
  // by `rid` (response_id), looked up in D.rows. No add wording anywhere. attending is NOT edited here
  // (the server keeps it as-is), consistent with the update contract.
  function openManualUpdate(rid) {
    var ov = document.getElementById('manual-overlay');
    if (!ov) { return; }
    var g = null, rows = (D && D.rows) || [];
    for (var i = 0; i < rows.length; i++) {
      if (String(rows[i].response_id || '') === String(rid)) { g = rows[i]; break; }
    }
    if (!g) { appModal.alert('האורח לא נמצא - רענן/י ונסה/י שוב.'); return; }
    _manualMode = 'update';
    _manualEditRid = String(rid);
    document.getElementById('m-name').value  = String(g.guest_name || '');
    document.getElementById('m-men').value   = String(Number(g.men_count) || 0);
    document.getElementById('m-women').value = String(Number(g.women_count) || 0);
    document.getElementById('m-phone').value = String(g.phone || '');
    _applyManualModeChrome();
    setManualMsg('', '');
    ov.classList.add('open');
    document.getElementById('m-name').focus();
  }

  // [MINE-MUT 2026-07-12] apply ALL mode-selected chrome strings for the manual modal in one place.
  // The 10 ADD-wording strings (title, subtitle, "adding-for" line, submit-btn label) are flipped here.
  function _applyManualModeChrome() {
    var isUpd = (_manualMode === 'update');
    var owner = String((D && D.senderName) || '');
    // "adding-for" line: add mode → "מוסיף עבור: <owner>"; update mode → an update-context line (no add wording).
    var af = document.getElementById('manual-adding-for');
    if (af) {
      if (isUpd) {
        af.innerHTML = 'עדכון אורח' + (owner ? (' של: ' + esc(owner)) : '');

        af.innerHTML = 'מוסיף עבור: ' + esc(owner);
        af.style.display = 'block';

        af.textContent = ''; af.style.display = 'none';

    // Modal h2 title.
    var ttl = document.getElementById('manual-title');
    if (ttl) { ttl.textContent = isUpd ? 'עדכון אורח' : 'הוספת מאשר ידנית'; }
    // Subtitle (update mode carries NO add wording).
    var sub = document.getElementById('manual-subtitle');
    if (sub) {
      sub.textContent = isUpd
        ? 'עריכת פרטי האורח שהוזן ידנית. השינוי יעודכן בספירה מיד.'
        : 'למי שאישר הגעה מחוץ לקישור (למשל הזמנה מודפסת). האורח יתווסף לספירה מיד.';
    }
    // Submit button label.
    var btn = document.getElementById('manual-submit-btn');
    if (btn) { btn.disabled = false; btn.textContent = isUpd ? 'שמור שינויים' : 'הוסף לרשימה'; }
