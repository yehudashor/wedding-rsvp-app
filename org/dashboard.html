  // ── Manual-add: refresh the board so the new person shows in the counts
  // ── INVITE-TOKEN: "מי לא אישר עדיין" panel. Reads Invites via getUnconfirmedInvites,
  //    gated identically to getDashboardData for the current MODE. Purely additive.
  // [ROUNDFIX-20260708 #6א] the static #unconf-panel is gone; "מי לא אישר עדיין" now renders IN-CONTENT
  // (UNCONF_VIEW → unconfInlineHtml, replacing the records area). openUnconfirmed/closeUnconfirmed/
  // isUnconfOpen/_unconfPanel were removed. fetchUnconfirmed + renderUnconfirmed still fill the same ids.
  function fetchUnconfirmed() {
    try {
      runScript('getUnconfirmedInvites', TOKEN, MODE, AUTH_PHONE)
        .then(renderUnconfirmed, renderUnconfirmedError);
    } catch (e) { renderUnconfirmedError(e); }
  }
  // [ROUNDFIX2 #3] cache the enriched people[] and render the category-grouped cards.
  function renderUnconfirmed(res) {
    if (!res || !res.ok) { return renderUnconfirmedError(); }
    UNCONF_PEOPLE = res.people || [];
    renderUnconfCards();
  }
  function renderUnconfirmedError() {
    UNCONF_PEOPLE = UNCONF_PEOPLE || [];
    var host = document.getElementById('unconf-cards');
    if (host) { host.innerHTML = '<div class=\'uc-empty\'>שגיאה בטעינה</div>'; }
  }

  function refreshBoard() {
    if (AUTH_PHONE) {
      authAndLoad(AUTH_PHONE);
    } else {
      // Master/combined view has no phone gate - re-render from server via getDashboardData.
      runScript('getDashboardData', TOKEN, MODE, AUTH_PHONE)
        .then(function (res) { if (res && !res.error) { renderData(res); } }, function () {});
    }
  }

  // [FIXLIST2 2026-07-10] client-side mirror of normalizeIsraeliPhone (07_security.js) -
  // IDENTICAL algorithm, so client validation can never accept what the server rejects:
  // digits-only, '972…'→'0…', 9-digit '5…'→'05…', then /^05[0-689]\d{7}$/ or ''.
  function normalizeIsraeliPhoneClient(raw) {
    var d = String(raw == null ? '' : raw).replace(/\D/g, '');
    if (d.indexOf('972') === 0) { d = '0' + d.slice(3); }
    if (d.length === 9 && d.charAt(0) === '5') { d = '0' + d; }
    if (/^05[0-689]\d{7}$/.test(d)) { return d; }
    return '';
  }

  // ── Manual-add: validate + submit to the EXISTING backend (addManualGuest).
  // Payload matches the addManualGuest(payload) contract in 01_brain.js:
  //   dashboard_token (auth), guest_name, phone, attending (bool), men_count, women_count.
  // sender_id/side are resolved server-side from the token (authoritative); channel = 'manual'.
  function submitManualAdd() {
    var name  = document.getElementById('m-name').value.trim();
    var men   = parseInt(document.getElementById('m-men').value, 10);   if (isNaN(men)   || men   < 0) { men   = 0; }
    var women = parseInt(document.getElementById('m-women').value, 10); if (isNaN(women) || women < 0) { women = 0; }
    var phone = document.getElementById('m-phone').value.trim();

    if (!name) {
      setManualMsg('יש להזין שם.', 'err');
      document.getElementById('m-name').focus();
      return;
    }

    // [FIXLIST2 2026-07-10] phone is now MANDATORY (user decision; the server enforces it too in
    // addManualGuest / 01_brain.js). Mirrors the name-validation pattern above; the format check
    // mirrors normalizeIsraeliPhone (07_security.js) EXACTLY via normalizeIsraeliPhoneClient.
    if (!phone) {
      setManualMsg('יש להזין טלפון.', 'err');
      document.getElementById('m-phone').focus();
      return;
    }
    if (normalizeIsraeliPhoneClient(phone) === '') {
      setManualMsg('מספר הטלפון אינו תקין - יש להזין מספר נייד ישראלי (למשל 0501234567).', 'err');
      document.getElementById('m-phone').focus();
      return;
    }

    var btn = document.getElementById('manual-submit-btn');

    // [MINE-MUT 2026-07-12] UPDATE mode: call updateManualGuest (in-place edit of an owned manual
    // guest) with mode-selected wording. attending is NOT sent (the server keeps it as-is).
    if (_manualMode === 'update') {
      var updPayload = {
        dashboard_token: TOKEN,
        response_id:     _manualEditRid,
        guest_name:      name,
        phone:           phone,
        men_count:       men,
        women_count:     women
      };
      if (btn) { btn.disabled = true; btn.textContent = 'מעדכן…'; }
      setManualMsg('', '');
      runScript('updateManualGuest', updPayload)
        .then(function (res) {
          if (res && res.success) {
            setManualMsg('עודכן בהצלחה!', 'ok');
            // [MINEFILTER 2026-07-12] MANUAL update → reset to "הכל" + focus the updated guest's card
            // (response_id is stable across an update; the card carries data-mine-card-rid).
            _mineManualReset((_manualEditRid ? { rid: String(_manualEditRid) } : null));
            refreshBoard();
            setTimeout(closeManualAdd, 900);
          } else {
            if (btn) { btn.disabled = false; btn.textContent = 'שמור שינויים'; }
            setManualMsg((res && res.error) ? res.error : 'שגיאה, נסה שוב', 'err');
          }
        }, function () {
          if (btn) { btn.disabled = false; btn.textContent = 'שמור שינויים'; }
          setManualMsg('שגיאה בשליחה, נסה שוב', 'err');
        });
      return;
    }

    var payload = {
      dashboard_token: TOKEN,
      guest_name:      name,
      men_count:       men,
      women_count:     women,
      phone:           phone,
      attending:       true
    };

    if (btn) { btn.disabled = true; btn.textContent = 'מוסיף…'; }
    setManualMsg('', '');

    runScript('addManualGuest', payload)
      .then(function (res) {
        if (res && res.success) {
          setManualMsg('נוסף בהצלחה!', 'ok');
          // [MINEFILTER 2026-07-12] MANUAL add → reset to "הכל" + focus the NEW guest's card
          // (server returns res.responseId; the card carries data-mine-card-rid).
          _mineManualReset((res.responseId ? { rid: String(res.responseId) } : null));
          refreshBoard();
          setTimeout(closeManualAdd, 900);
        } else {
          if (btn) { btn.disabled = false; btn.textContent = 'הוסף לרשימה'; }
          setManualMsg((res && res.error) ? res.error : 'שגיאה, נסה שוב', 'err');
        }
      }, function () {
        if (btn) { btn.disabled = false; btn.textContent = 'הוסף לרשימה'; }
        setManualMsg('שגיאה בשליחה, נסה שוב', 'err');
      });
  }

  // ── Authenticate the phone against the server, then render on success
  function authAndLoad(phone) {
    runScript('getDashboardData', TOKEN, MODE, phone)
      .then(function (res) {
        if (res && res.error) {
          localStorage.removeItem(LSKEY);
          showPhonePrompt('מספר לא תואם, נסה שוב');
        } else {
          localStorage.setItem(LSKEY, phone);
          AUTH_PHONE = phone;
          renderData(res);
        }
      }, function () { showPhonePrompt('שגיאה, נסה שוב'); });
  }

  // ── G2 EDIT 2: live-sync bridge - the host SPA polls check_updates and posts
  //    {type:'wedding-refresh'} on any new guest; refresh the board in place.
  //    Skip while the manual-add modal is open (never clobber in-progress input)
  //    and while unauthenticated; simple in-flight guard prevents request stacking.
  var _refreshBusy = false;
  window.addEventListener('message', function (e) {
    if (!e || !e.data || e.data.type !== 'wedding-refresh') return;
    try {
      var ov = document.getElementById('manual-overlay');
      if (ov && ov.classList.contains('open')) return; /* never clobber in-progress manual add */
      if (NEEDS_PHONE && !AUTH_PHONE) return; /* not authenticated yet */
      if (_refreshBusy) return;
      _refreshBusy = true;
      setTimeout(function () { _refreshBusy = false; }, 4000);
      refreshBoard();
      // [ROUNDFIX-20260708 #6א] keep the in-content unconfirmed view live only while it is the active view.
      if (UNCONF_VIEW) { fetchUnconfirmed(); }
    } catch (err) {}
  });

  // ── Gate on load
  document.addEventListener('DOMContentLoaded', function () {
    var gateBtn = document.getElementById('gateBtn');
    if (gateBtn) {
      gateBtn.addEventListener('click', function () {
        authAndLoad(document.getElementById('gatePhone').value);
      });
    }
    var gatePhone = document.getElementById('gatePhone');
    if (gatePhone) {
      gatePhone.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { authAndLoad(gatePhone.value); }
      });
    }

    // Manual-add modal wiring
    var mSubmit = document.getElementById('manual-submit-btn');
    if (mSubmit) { mSubmit.addEventListener('click', submitManualAdd); }
    var mCancel = document.getElementById('manual-cancel-btn');
    if (mCancel) { mCancel.addEventListener('click', closeManualAdd); }
    var mOverlay = document.getElementById('manual-overlay');
    if (mOverlay) {
      mOverlay.addEventListener('click', function (e) {
        if (e.target === mOverlay) { closeManualAdd(); }   // click on the backdrop closes
      });
    }

    // ── G5 A4d: DELEGATED "קרא עוד…" expander - attached ONCE on the stable
    //    #dashboard-content container so it survives every renderData rebuild.
    var dc = document.getElementById('dashboard-content');
    if (dc) {
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('.rm-btn') : null;
        if (!b) { return; }
        var td = b.closest('td.longtext'); if (!td) { return; }
        var open = td.classList.toggle('expanded');
        b.textContent = open ? 'הסתר' : 'קרא עוד…';
      });

      // ── S1c D2: DELEGATED per-organiser tab switch (combined view). Attached ONCE on
      //    the stable container so it survives every renderData rebuild. Pure DOM toggle:
      //    within the clicked tab's side, mark it aria-selected and show only its panel.
      dc.addEventListener('click', function (ev) {
        var tab = ev.target && ev.target.closest ? ev.target.closest('.org-tab') : null;
        if (!tab) { return; }
        var side = tab.getAttribute('data-org-side');
        if (!side) { return; }
        // [ROUNDFIX2b #5] ACCORDION (side-org): toggle THIS organiser's own panel open/closed in place,
        // right below its name; a second click on the same name closes it. Independent of the others.
        if (side === 'sideorg') {
          var own = document.getElementById(tab.getAttribute('aria-controls'));
          if (own) {
            var opening = own.hidden;
            own.hidden = !opening;
            tab.setAttribute('aria-expanded', opening ? 'true' : 'false');
          }
          return;
        }
        // Combined (groom/bride): EXCLUSIVE tabs — show only the clicked panel within its bar.
        var bar = tab.parentNode; // the .org-tabs bar for this side
        var sideTabs = bar.querySelectorAll('.org-tab');
        for (var i = 0; i < sideTabs.length; i++) {
          var t = sideTabs[i];
          var on = (t === tab);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
          var pan = document.getElementById(t.getAttribute('aria-controls'));
          if (pan) { pan.hidden = !on; }
        }
      });

      // ── [CATEGORIES-FEATBATCH2 N4] DELEGATED category-disclosure toggle. ONE handler on the stable
      //    #dashboard-content (mirrors the .org-tab pattern) so it survives every renderData rebuild and
      //    is compatible with N5's immediate re-render. Applies to BOTH the own "חלוקה לקטגוריות" view
      //    and the N3 side-org drill-in: a click on a .cat-toggle header shows/hides its guest table.
      dc.addEventListener('click', function (ev) {
        var hd = ev.target && ev.target.closest ? ev.target.closest('.cat-toggle') : null;
        if (!hd) { return; }
        var pid = hd.getAttribute('data-cat-toggle');
        var pan = pid ? document.getElementById(pid) : null;
        if (!pan) { return; }
        var open = pan.hidden;          // currently hidden → we are opening it
        pan.hidden = !open;
        hd.setAttribute('aria-expanded', open ? 'true' : 'false');
      });

      // [UIPOLISH3 2026-07-04 - part ד] DELEGATED guest-list filter (personal view). Attached
      //   ONCE on the stable #dashboard-content so it survives every renderData rebuild. Sets
      //   FILTER and re-renders from the cached D object - the active pill + filtered table stay
      //   in sync. Display only; no core/data logic is touched.
      dc.addEventListener('click', function (ev) {
        var fb = ev.target && ev.target.closest ? ev.target.closest('.flt-btn') : null;
        if (!fb) { return; }
        var v = fb.getAttribute('data-flt');
        if (!v) { return; }
        // [MINETOGGLE 2026-07-12] In the MINE view the "הכל" attending chip is hidden (filterBarHtml(true)),
        // so re-clicking the active coming/notcoming chip must TOGGLE it OFF → FILTER back to 'all' (the
        // attending "all" state). All-clear then re-lights the master "הכל" (see _allActive). In the
        // personal list the 'all' chip is present, so a re-click there stays a no-op (unchanged UX).
        if (v === FILTER) {
          if (MINE_VIEW && v !== 'all') { FILTER = 'all'; }
          else { return; }
        } else {
          FILTER = v;
        }
        // [MINESCROLL 2026-07-12] the attending filter is shared by the personal list + the MINE view;
        // queue a LEVEL-2 auto-scroll ONLY when it fired inside the MINE view.
        if (MINE_VIEW) { _mineFilterPending = true; _mineEntryPending = false; }
        renderData(D);
      });

      // [ROUNDFIX2 #3] unconfirmed-cards filter (הכל / טופס טרם נפתח / נפתח אך טרם אושר). Same .flt-btn
      // class, distinct data-ucflt attribute → this and the guest-list data-flt handler never collide.
      // Re-renders the cards from the cache (no server refetch); updates the active pill in place.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('.flt-btn') : null;
        if (!b) { return; }
        var v = b.getAttribute('data-ucflt');
        if (!v || v === UNCONF_FILTER) { return; }
        UNCONF_FILTER = v;
        var pills = b.parentNode.querySelectorAll('.flt-btn');
        for (var i = 0; i < pills.length; i++) { pills[i].classList.toggle('active', pills[i] === b); }
        renderUnconfCards();
      });

      // [ROUNDFIX2 #2] assign a category to a NOT-YET-CONFIRMED guest from their card (own invites only).
      // Writes via the SAME categoryOp the confirmed-guest flow uses, keyed by the invite person_key
      // ('name:'+normName+'_'+sid); on confirmation 01_brain.js migrates it to the real dedupe_key.
      dc.addEventListener('change', function (ev) {
        var sel = ev.target && ev.target.closest ? ev.target.closest('.uc-cat-sel') : null;
        if (!sel) { return; }
        var pk = sel.getAttribute('data-pk');
        if (!pk) { return; }
        var cid = sel.value || '';
        if (UNCONF_PEOPLE) {   // optimistic cache update so the card doesn't jump before the refetch
          for (var i = 0; i < UNCONF_PEOPLE.length; i++) {
            if (UNCONF_PEOPLE[i].person_key === pk) { UNCONF_PEOPLE[i].cat_id = cid; break; }
          }
        }
        var body = cid
          ? { action: 'categoryOp', op: 'assign', token: TOKEN, phone: AUTH_PHONE, cat_id: cid, dedupe_keys: [pk] }
          : { action: 'categoryOp', op: 'unassign', token: TOKEN, phone: AUTH_PHONE, dedupe_keys: [pk] };
        runScript('categoryOp', body)
          .then(function () { fetchUnconfirmed(); }, function () { fetchUnconfirmed(); });
      });

      // [MINEFILTER 2026-07-12] the SINGLE master "הכל" button (data-mine-master). Resets ALL THREE
      // filter groups at once (category='' , source='' , attending='all') and re-renders showing every
      // guest. No focus request — this is a filter reset, not a guest mutation.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('[data-mine-master]') : null;
        if (!b) { return; }
        // [MASTERALL 2026-07-12] no early-return when already all-state: clearing to all is idempotent
        // (no visible filter change) but every click must still fire the LEVEL-2 auto-scroll below.
        MINE_CAT_FILTER = ''; MINE_SRC_FILTER = ''; FILTER = 'all';
        _mineFilterPending = true; _mineEntryPending = false;   // [MINESCROLL] LEVEL-2 auto-scroll
        renderData(D);
      });

      // [MINESCROLL 2026-07-12] the "back-up" arrow — steps back exactly ONE level per click. It does
      // NOT re-render (so the same #mine-backup-arrow persists across the LEVEL-2→LEVEL-1 step); each
      // click is a PROGRAMMATIC scroll (armed guard) so the scroll listener never mis-hides it mid-step.
      //   from LEVEL 2 → scroll to the heading (LEVEL 1); arrow STAYS, now in its level-1 state.
      //   from LEVEL 1 → scroll to the exact PAGE TOP (entry state); arrow HIDES.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('[data-mine-backup]') : null;
        if (!b) { return; }
        _mineArmProg();                                  // this scroll is ours — don't let it self-hide
        if (_mineBackLevel === 2) {
          var hd = document.getElementById('mine-heading');
          _mineBackLevel = 1;
          _mineShowArrow(1);                             // keep visible, re-stamp to level 1
          if (hd && hd.scrollIntoView) { try { hd.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (e) {} }
        } else {
          // LEVEL 1 (or any other) → back to the very top (entry state) and hide the arrow.
          _mineHideArrow();
          try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
        }
      });

      // [ROUNDFIX2g #5] MINE category-filter chips (data-minecatflt). Distinct attribute → never collides
      // with the attending data-flt or the unconfirmed data-ucflt handlers. Re-renders from the cache.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('.mcf-chip') : null;
        if (!b) { return; }
        var v = b.getAttribute('data-minecatflt') || '';
        // [MINETOGGLE 2026-07-12] TOGGLE: re-clicking the already-active chip DESELECTS it → this
        // dimension returns to "all" (''). Clicking a different chip single-selects it (as before).
        // When this clears the last active filter, the render lights the master "הכל" (see _allActive).
        MINE_CAT_FILTER = (v === MINE_CAT_FILTER) ? '' : v;
        _mineFilterPending = true; _mineEntryPending = false;   // [MINESCROLL] LEVEL-2 auto-scroll
        renderData(D);
      });

      // [MINE-MUT 2026-07-12] MINE SOURCE-filter chips (data-minesrcflt). Distinct attribute → never
      // collides with the category (data-minecatflt) / attending (data-flt) handlers. Re-renders from cache.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('.msf-chip') : null;
        if (!b) { return; }
        var v = b.getAttribute('data-minesrcflt') || '';
        // [MINETOGGLE 2026-07-12] TOGGLE: re-clicking the active chip DESELECTS it → source back to
        // "all" (''); a different chip single-selects. All-clear re-lights the master "הכל".
        MINE_SRC_FILTER = (v === MINE_SRC_FILTER) ? '' : v;
        _mineFilterPending = true; _mineEntryPending = false;   // [MINESCROLL] LEVEL-2 auto-scroll
        renderData(D);
      });

      // [MINE-MUT 2026-07-12] MINE per-card DELETE (manual guests only). data-rid = response_id.
      // כן/לא confirm via the appModal label-override, then deleteManualGuest + refresh MINE on success.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('[data-mine-act="delete"]') : null;
        if (!b) { return; }
        var rid = b.getAttribute('data-rid') || '';
        if (!rid) { return; }
        appModal.confirm('האם הינך בטוח שהינך רוצה למחוק את האורח?', '', { yes: 'כן', no: 'לא' }).then(function (ok) {
          if (!ok) { return; }
          runScript('deleteManualGuest', { dashboard_token: TOKEN, response_id: rid })
            .then(function (res) {
              if (res && res.success) {
                // [MINEFILTER 2026-07-12] MANUAL delete → reset to "הכל". No focus (the guest is gone).
                _mineManualReset(null);
                refreshBoard();
              }
              else { appModal.alert((res && res.error) ? res.error : 'שגיאת מחיקה, נסה שוב'); }
            }, function () { appModal.alert('שגיאת תקשורת - נסו שוב'); });
        });
      });

      // [MINE-MUT 2026-07-12] MINE per-card UPDATE (manual guests only). Opens the manual modal in
      // UPDATE mode, pre-filled from the guest looked up by response_id in D.rows.
      dc.addEventListener('click', function (ev) {
        var b = ev.target && ev.target.closest ? ev.target.closest('[data-mine-act="update"]') : null;
        if (!b) { return; }
        var rid = b.getAttribute('data-rid') || '';
        if (!rid) { return; }
        openManualUpdate(rid);
      });

      // [ROUNDFIX2g #4] MINE per-guest category assign/unassign. data-dk = the CONFIRMED guest's dedupe_key
      // (the same key GuestCategory is keyed by). Optimistic join-map update so the card/filter don't flicker.
      dc.addEventListener('change', function (ev) {
        var sel = ev.target && ev.target.closest ? ev.target.closest('.mine-cat-sel') : null;
        if (!sel) { return; }
        var dk = sel.getAttribute('data-dk');
        if (!dk) { return; }
        var cid = sel.value || '';
        if (cid) { CAT_ASSIGN[String(dk)] = cid; } else { delete CAT_ASSIGN[String(dk)]; }
        // [MINEFILTER 2026-07-12] MANUAL organiser category assign/unassign → reset to "הכל" + focus
        // that guest's card (dedupe_key is the card's data-mine-card-dk). fetchCategories(true) re-renders.
        _mineManualReset({ dk: String(dk) });
        var body = cid
          ? { action: 'categoryOp', op: 'assign', token: TOKEN, phone: AUTH_PHONE, cat_id: cid, dedupe_keys: [dk] }
          : { action: 'categoryOp', op: 'unassign', token: TOKEN, phone: AUTH_PHONE, dedupe_keys: [dk] };
        runScript('categoryOp', body)
          .then(function () { fetchCategories(true); }, function () { fetchCategories(true); });
      });

      // [ROUNDFIX2g #4] MINE floating category icons: ＋ add / ✏ rename / 🗑 delete. Reuse postCategoryOp
      // (which re-renders from the authoritative server list). rename/delete act on the card's SELECTED cat.
      dc.addEventListener('click', function (ev) {
        var icn = ev.target && ev.target.closest ? ev.target.closest('.mine-cat-ic') : null;
        if (!icn) { return; }
        var act = icn.getAttribute('data-icat');
        var card = icn.closest ? icn.closest('.mine-card') : null;
        var selEl = card ? card.querySelector('.mine-cat-sel') : null;
        var curCid = selEl ? (selEl.value || '') : '';
        function trim(s) { return String(s == null ? '' : s).replace(/^\s+|\s+$/g, ''); }
        // [FIXLIST5 2026-07-10] appModal replaces the native prompt/alert/confirm - identical
        // semantics per kind (prompt: null = ביטול, trim(null)='' keeps the old no-op; confirm:
        // the op runs ONLY on אישור). Each branch's continuation moved into .then; the branches
        // are mutually exclusive and nothing follows the if/else-if chain in this handler.
        if (act === 'add') {
          // [FIXLIST-R3 #1 2026-07-10] capture THIS card's guest key so the new category is auto-assigned
          // to that guest (server does it atomically; combobox updates on the re-render). Manager-level
          // add (the category-panel button) is a different handler and stays assignment-less.
          var _addDk = selEl ? String(selEl.getAttribute('data-dk') || '') : '';
          appModal.prompt('שם הקטגוריה החדשה:', '').then(function (res) {
            var nm = trim(res);
            if (nm) { postCategoryOp({ op: 'create', name: nm, dedupe_keys: _addDk ? [_addDk] : [] }); }
          });
        } else if (act === 'rename') {
          if (!curCid) { appModal.alert('בחר/י קודם קטגוריה מהרשימה, ואז שנה/י את שמה.'); return; }
          var cur = _catNameById(curCid);
          appModal.prompt('שם חדש לקטגוריה:', cur).then(function (res) {
            var nn = trim(res);
            if (nn && nn !== cur) { postCategoryOp({ op: 'rename', cat_id: curCid, name: nn }); }
          });
        } else if (act === 'delete') {
          if (!curCid) { appModal.alert('בחר/י קודם קטגוריה מהרשימה, ואז מחק/י אותה.'); return; }
          appModal.confirm('למחוק את הקטגוריה "' + _catNameById(curCid) + '"? השיוך יוסר מכל האורחים שבה (האורחים עצמם לא נמחקים).').then(function (ok) {
            if (ok) { postCategoryOp({ op: 'delete', cat_id: curCid }); }
          });
        }
      });
    }

    if (NEEDS_PHONE) {
      // PHASE 4: the SPA injects ?phone= via the server (t.PHONE_PREFILL). When present,
      // auto-pass the phone gate so the dashboard NEVER prompts inside the SPA iframe.
      // The prompt remains the fallback when absent/invalid (authAndLoad shows it on mismatch).
      var prefill = String(PHONE_PREFILL || '').trim();
      var remembered = localStorage.getItem(LSKEY);
      if (prefill) { authAndLoad(prefill); }
      else if (remembered) { authAndLoad(remembered); }
      else { showPhonePrompt(''); }
    } else if (SRV_ERR) {
      showError(SRV_ERR);
    } else {
      // [CATEGORIES-FEATBATCH] combined super iframe: seed AUTH_PHONE from the server-injected
      // PHONE_PREFILL so authenticated in-iframe category ops + act-as reloads carry the phone
      // (the OWNER_SID self-serve path requires it; a MASTER_TOKEN caller ignores it). No prompt.
      AUTH_PHONE = String(PHONE_PREFILL || '').trim();
      // [CATEGORIES-FEATBATCH A3b] defensively seed CAT_OWNER from the server-forwarded ownerSid on
      // the initial combined load. The server already scoped SRV_DATA to this owner_sid (getDashboardData
      // act-as path), so seeding CAT_OWNER keeps the board + the in-iframe category manager coherent
      // (categoryOp/getCategoriesData then target the same owner). SUPER-ONLY: only the combined board
      // may act-as, and only the super may pass owner_sid; a non-super board never reaches this branch
      // with a seed (IS_SUPER guards it, and a forged owner_sid was already rejected server-side).
      if (IS_SUPER && OWNER_SID_INIT) {
        CAT_OWNER = OWNER_SID_INIT;
        CAT_VIEW = true;   // an act-as owner_sid opens straight into that owner's grouped view (mirrors pickPrimaryForSide)
      }
      /* [IRONFIX 2026-07-09] self-hosted combined board: SRV_DATA is no longer server-injected; run the
         SAME getDashboardData(token,'combined',phone,owner_sid) call doGet made, then render. The error
         path mirrors _renderDashboard 1:1 (failed gate -> data stays {}, the error text is shown). */
      runScript('getDashboardData', TOKEN, 'combined', PHONE_PREFILL, OWNER_SID_INIT)
        .then(function (res) {
          if (res && !res.error) {
            SRV_DATA = res;
            try { renderData(SRV_DATA); } catch (e) { showError('שגיאה'); }
          } else {
            /* [verifier-2 F4] mirror _renderDashboard's failed-gate zeroing (02_server.js:722-732):
               on a failed combined gate the GAS template rendered with token=''/PHONE_PREFILL=''/
               ownerSid='' so no later in-page action (e.g. a wedding-refresh ping) could act on the
               rejected credentials. Reproduce that exactly. */
            TOKEN = ''; PHONE_PREFILL = ''; OWNER_SID_INIT = ''; CAT_OWNER = ''; AUTH_PHONE = '';
            showError((res && res.error) || 'אין גישה');
          }
        }, function () { showError('שגיאה'); });
    }
  });
}());
</script>

    <div class='manual-actions'>
